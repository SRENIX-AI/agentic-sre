# Agentic SRE — OLM ClusterServiceVersion
#
# Generated and maintained by hand (NOT operator-sdk generate bundle) so
# the install strategy stays in lock-step with the chart's
# templates/operator-deployment.yaml — the two are the source-of-truth
# pair. Any time the chart's operator Deployment changes, this CSV's
# spec.install.deployments[0] mirrors it. The bundle-smoke CI job
# (Phase 1c slice C) validates the parity end-to-end on a kind cluster.
apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  name: agentic-sre.v1.9.4
  namespace: placeholder
  annotations:
    capabilities: "Basic Install"
    categories: "Monitoring,OpenShift Optional"
    containerImage: "docker4zerocool/agentic-sre:1.9.4"
    description: >-
      Agentic SRE reconciles a AgenticSRE CR
      into the watcher Deployment, diagnose / remediate CronJobs,
      ServiceAccount, and cluster-wide reader RBAC. The watcher binary
      itself runs the probe / analyzer / fixer loop — the operator is
      the lifecycle manager.
    repository: "https://github.com/srenix-ai/agentic-sre"
    support: "https://github.com/srenix-ai/agentic-sre/issues"
spec:
  displayName: Agentic SRE
  description: |
    Agentic SRE (Srenix) is an in-cluster operator that
    detects drift across Kubernetes, AWS, GCP, and Azure surfaces and
    applies policy-bounded fixes with full human-approval audit. The
    operator reconciles `AgenticSRE` custom resources into
    the workloads the chart already produces (watcher + diagnose /
    remediate CronJobs + ServiceAccount + reader ClusterRoleBinding).

    Optional CRDs registered in this bundle:
      - `ResolutionRecord` — the verified-outcome system of record
        the watcher appends after every applied + verified remediation.
      - `Silence` — operator-controlled finding suppression with a
        bounded `spec.until`; matches Alertmanager-silences ergonomics.

  version: 1.9.4
  maturity: alpha
  minKubeVersion: "1.27.0"
  keywords:
    - kubernetes
    - drift
    - remediation
    - sre
    - automation
    - cloud
  maintainers:
    - name: Srenix
      email: support@srenix.ai
  provider:
    name: Srenix
    url: https://github.com/Srenix

  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: false
    - type: AllNamespaces
      supported: true

  customresourcedefinitions:
    owned:
      - name: agenticsres.srenix.ai
        version: v1alpha1
        kind: AgenticSRE
        displayName: Agentic SRE
        description: One CR per Srenix install. The operator reconciles each into a watcher Deployment + diagnose/remediate CronJobs + ServiceAccount + reader RBAC.
      - name: silences.srenix.ai
        version: v1alpha1
        kind: Silence
        displayName: Silence
        description: Time-bounded noise suppression. The watcher filters matched diagnostics before downstream emission.
      - name: resolutionrecords.srenix.ai
        version: v1alpha1
        kind: ResolutionRecord
        displayName: Resolution Record
        description: Append-only system of record for verified remediation outcomes. The RAG memory loop reads these.
      - name: driftreports.srenix.ai
        version: v1alpha1
        kind: DriftReport
        displayName: Drift Report
        description: Active drift findings the watcher emits per probe cycle.

  install:
    strategy: deployment
    spec:
      clusterPermissions:
        # Operator's own RBAC — MUST match the chart's
        # templates/operator-deployment.yaml ClusterRole rules verbatim.
        # When that template changes, this list changes in the SAME PR.
        - serviceAccountName: srenix-operator-sa
          rules:
            # AgenticSRE CR + status + finalizers.
            # `update,patch` on the main resource are required so the
            # reconciler can add/remove FinalizerOperatorRBAC; the
            # /finalizers subresource verb alone is for OwnerReference
            # cross-namespace GC and does NOT cover plain
            # metadata.finalizers edits. Mirror the chart's operator
            # ClusterRole — TestBundle_CSVAndChartRBACInLockstep
            # enforces the parity.
            - apiGroups: ["srenix.ai"]
              resources: ["agenticsres"]
              verbs: ["get", "list", "watch", "update", "patch"]
            - apiGroups: ["srenix.ai"]
              resources: ["agenticsres/status"]
              verbs: ["get", "patch", "update"]
            - apiGroups: ["srenix.ai"]
              resources: ["agenticsres/finalizers"]
              verbs: ["update"]
            # Managed children. Phase 2b added Service + StatefulSet
            # (Qdrant). Phase 2c-B added Secret (Ed25519 signing key)
            # + roles/rolebindings (approval-server namespaced RBAC).
            # PVCs flow transitively via the StatefulSet's
            # volumeClaimTemplates — no pvc verbs needed.
            - apiGroups: [""]
              resources: ["serviceaccounts"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: [""]
              resources: ["secrets"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["apps"]
              resources: ["statefulsets"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            - apiGroups: ["batch"]
              resources: ["cronjobs"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # Approval-server stores backend ConfigMaps (operator must hold
            # these verbs to pass RBAC escalation prevention on k3s).
            - apiGroups: [""]
              resources: ["configmaps"]
              verbs: ["get", "list", "watch", "create", "update", "patch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "escalate", "bind"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["rolebindings"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # Phase 2c-C: optional approval-server Ingress + P2.6b
            # approval-server NetworkPolicy.
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # Leader-election Lease.
            - apiGroups: ["coordination.k8s.io"]
              resources: ["leases"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
            # Audit events.
            - apiGroups: [""]
              resources: ["events"]
              verbs: ["create", "patch"]
            # One-click Silence: operator holds silences verbs so it can
            # materialize the approval-server's `create silences` Role
            # past RBAC escalation prevention. Mirror the chart in lockstep.
            - apiGroups: ["srenix.ai"]
              resources: ["silences"]
              verbs: ["get", "list", "create"]
            # Phase 1c: operator-provisioned reader RBAC. `escalate`
            # bypasses the admission check that the creator must
            # already hold every verb being granted — required because
            # the reader role grants ~25 resource reads the operator
            # itself doesn't hold. Mirror the chart in lockstep.
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["clusterroles"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete", "escalate", "bind"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["clusterrolebindings"]
              verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

      deployments:
        - name: srenix-operator
          label:
            app.kubernetes.io/name: agentic-sre
            app.kubernetes.io/component: operator
            srenix.ai/role: operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: agentic-sre
                srenix.ai/role: operator
            template:
              metadata:
                labels:
                  app.kubernetes.io/name: agentic-sre
                  srenix.ai/role: operator
              spec:
                serviceAccountName: srenix-operator-sa
                containers:
                  - name: operator
                    image: docker4zerocool/agentic-sre:1.9.4
                    imagePullPolicy: IfNotPresent
                    command:
                      - /srenix-operator
                    args:
                      - --leader-elect=true
                      - --metrics-bind-address=:8080
                      - --health-probe-bind-address=:8081
                    env:
                      - name: MY_POD_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: MY_POD_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.name
                    ports:
                      - containerPort: 8080
                        name: metrics
                        protocol: TCP
                      - containerPort: 8081
                        name: probes
                        protocol: TCP
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: probes
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: probes
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources: {}
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      readOnlyRootFilesystem: true
                      capabilities:
                        drop: ["ALL"]

  # Optional links for OperatorHub listings.
  links:
    - name: GitHub
      url: https://github.com/srenix-ai/agentic-sre
    - name: Helm chart
      url: https://srenix-ai.github.io/agentic-sre
    - name: Operator Phase 1c design doc
      url: https://github.com/srenix-ai/agentic-sre/blob/main/docs/design/2026-05-v1.9-operator-phase-1c.md
