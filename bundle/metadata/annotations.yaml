# OLM bundle metadata. Lines below are the canonical annotation set
# operator-sdk would emit; documented per-line so future bumps don't
# require re-reading the OLM spec.
annotations:
  # Bundle format — `registry+v1` is the current standard.
  operators.operatorframework.io.bundle.mediatype.v1: "registry+v1"
  # Where the bundle's manifest YAMLs live inside the image.
  operators.operatorframework.io.bundle.manifests.v1: "manifests/"
  # Where the metadata YAMLs live inside the image.
  operators.operatorframework.io.bundle.metadata.v1: "metadata/"
  # The package name the bundle belongs to. Matches the CSV's
  # spec.displayName slug + the operator's chart name.
  operators.operatorframework.io.bundle.package.v1: "cluster-health-autopilot"
  # The channel(s) this bundle ships on. `alpha` while the operator
  # port is pre-1.0; `stable` lands when Phase 1c + 2 + 3 are GA.
  operators.operatorframework.io.bundle.channels.v1: "alpha"
  # The default channel an operator installs from.
  operators.operatorframework.io.bundle.channel.default.v1: "alpha"
