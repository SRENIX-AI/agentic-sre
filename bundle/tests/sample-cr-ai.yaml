# AI+approval sample CR used by the bundle-smoke CI job (Phase 2+ path).
#
# Purpose: verify that the operator reconciles the full AI stack objects
# (aiwatch Deployment, approval-server SA/Deployment/Service/Secret, fixer
# ClusterRoleBinding, signing-key Secret) without errors. We do NOT wait
# for these pods to reach Ready=True because the smoke image is the OSS
# binary, not the srenix-enterprise binary the AI tier needs. What we DO verify:
#   - All objects are created (kubectl get)
#   - signing-key Secret has both PEM keys
#   - ApprovalServerReady condition exists (even as False/NoAvailableReplicas
#     — that means the operator ran through the reconciler successfully)
#   - No InvalidSpec condition (endpoint + model are set; replicas=1 with
#     inmemory backend is valid)
#
# The approval-server endpoint URL below points at the in-cluster OSS
# watcher Service — the srenix-enterprise binary won't start (wrong image), but the
# operator only needs the endpoint field to be non-empty for validation.
apiVersion: srenix.ai/v1alpha1
kind: AgenticSRE
metadata:
  name: smoke-ai
  namespace: srenix-system
spec:
  image:
    repository: agentic-sre
    tag: "smoke"
    pullPolicy: IfNotPresent
  watcher:
    enabled: false
  diagnose:
    enabled: false
  remediate:
    enabled: false
  ai:
    enabled: true
    # endpoint + model are required when ai.enabled=true. The aiwatch
    # container will not successfully call this (wrong binary), but the
    # operator needs valid values to pass reconciler validation.
    endpoint: "http://smoke-ai-watcher.srenix-system.svc:8000/v1"
    model: "smoke-model"
    interval: "3600s"
  approval:
    enabled: true
    replicas: 1
    # store.backend defaults to inmemory — replicas=1 is the valid
    # combination; the validation fix ensures >1 would be rejected.
