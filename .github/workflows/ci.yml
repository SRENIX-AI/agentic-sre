name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -trimpath -o bin/cha ./cmd/cha

      - name: cha version
        run: ./bin/cha version

      - name: go test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: coverage summary
        if: always()
        run: |
          go tool cover -func=coverage.out | tail -20
          echo
          echo "Total coverage:"
          go tool cover -func=coverage.out | awk '/^total:/ {print $3}'

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.0
          args: --timeout=5m

  chart-test:
    name: helm lint + unittest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --verify=false

      - name: helm lint
        run: helm lint charts/cluster-health-autopilot

      - name: helm unittest
        run: helm unittest charts/cluster-health-autopilot

      - name: helm template smoke (default values)
        run: helm template foo charts/cluster-health-autopilot > /tmp/rendered.yaml && wc -l /tmp/rendered.yaml

      - name: helm template smoke (watcher + remediation + leader election)
        run: |
          helm template foo charts/cluster-health-autopilot \
            --set watcher.enabled=true \
            --set remediation.enabled=true \
            --set watcher.leaderElection.enabled=true \
            > /tmp/rendered-full.yaml
          wc -l /tmp/rendered-full.yaml
