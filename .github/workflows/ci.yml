name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: true

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -trimpath -o bin/cha ./cmd/cha

      - name: cha version
        run: ./bin/cha version

      - name: go test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: coverage summary
        if: always()
        run: |
          go tool cover -func=coverage.out | tail -20
          echo
          echo "Total coverage:"
          go tool cover -func=coverage.out | awk '/^total:/ {print $3}'

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          check-latest: true
          cache: true

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.5.0
          args: --timeout=5m
