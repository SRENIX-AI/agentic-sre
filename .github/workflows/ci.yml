name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test
    runs-on: ubuntu-latest
    # 20 minutes — the 10-min cap from earlier worked while the suite
    # was small. As of v1.15.0 the suite + race-detector + coverage
    # output runs in 7-10 min steady-state, and PR #149 tipped over to
    # 10m5s. 20min gives 2× headroom without inviting runaway tests.
    # Mirrors the same fix made to release.yml in PR #145
    # (60→120 min) — same class of pattern: tight cap on a steadily-
    # growing pipeline.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      # helm is required by the chart-args↔binary-flags parity gates
      # (cmd/cha + cmd/cha-operator chartflags_test.go, P3.1) and the
      # chart-toggle drift gate (internal/chartgate, P1.8) — they shell
      # out to `helm template`. Without helm on PATH those tests t.Skip
      # locally, so they MUST have helm here or the gate never runs.
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2

      - name: go mod verify
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build -trimpath -o bin/cha ./cmd/cha

      - name: cha version
        run: ./bin/cha version

      - name: go test
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: coverage summary
        if: always()
        run: |
          go tool cover -func=coverage.out | tail -20
          echo
          echo "Total coverage:"
          go tool cover -func=coverage.out | awk '/^total:/ {print $3}'

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          # changelog-tag-check.sh verifies every released CHANGELOG
          # heading against the repo's git tags.
          fetch-tags: true

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.0
          args: --timeout=5m

      # CHANGELOG hygiene gate (P3.3b): one ISO date per version heading,
      # descending semver order, no duplicate version headings. Catches the
      # doubled-date / out-of-order defects that slipped into CHANGELOG.md.
      - name: changelog lint
        run: bash scripts/changelog-lint.sh

      # CHANGELOG ↔ git-tag parity (O9): every released `## [x.y.z]`
      # heading except the topmost (the in-flight release) must have a
      # matching vx.y.z (or chart-releaser) tag, and [Unreleased] may
      # not present any version as already shipped.
      - name: changelog tag check
        # Belt-and-braces tag fetch: actions/checkout's `fetch-tags: true`
        # does not reliably deliver tags on PR merge-ref checkouts, and
        # the script (correctly) exits 2 on a tagless checkout. Fetch
        # tags explicitly so the gate always sees the real tag list.
        run: |
          git fetch --tags --force --quiet origin
          bash scripts/changelog-tag-check.sh

      # Fixture tests for the gate itself: prose inside [Unreleased]
      # that merely mentions a version + date must PASS (the dated
      # check is anchored to the heading signature); version-numbered
      # headings and untagged release headings must FAIL.
      - name: changelog tag check selftest
        run: bash scripts/changelog-tag-check_test.sh

  chart-test:
    name: helm lint + unittest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Install helm-unittest plugin
        # Pinned to v1.0.3: last release whose plugin.yaml still uses
        # the legacy `command:` field (Helm 3.16 rejects the
        # `platformHooks` / `platformCommand` fields introduced in
        # v1.1.0+ with "json: unknown field" errors). v1.0.3 supports
        # the modern `rules[*].verbs[*]` glob assertion syntax used
        # in our tests/rbac_test.yaml.
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3

      - name: helm lint
        run: helm lint charts/cluster-health-autopilot

      - name: helm unittest
        run: helm unittest charts/cluster-health-autopilot

      - name: helm template smoke (default values)
        run: helm template foo charts/cluster-health-autopilot > /tmp/rendered.yaml && wc -l /tmp/rendered.yaml

      - name: helm template smoke (watcher + remediation + leader election)
        run: |
          helm template foo charts/cluster-health-autopilot \
            --set watcher.enabled=true \
            --set remediation.enabled=true \
            --set watcher.leaderElection.enabled=true \
            > /tmp/rendered-full.yaml
          wc -l /tmp/rendered-full.yaml
