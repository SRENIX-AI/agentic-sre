name: release

# Triggered by git tags matching v*.*.* (e.g. v0.1.0, v1.2.3-rc1).
# Produces:
#   - Tarball binaries for darwin-{amd64,arm64} + linux-{amd64,arm64}
#   - Multi-arch container image at ghcr.io/<org>/cluster-health-autopilot:<tag>
#   - GitHub Release with checksums + autogenerated changelog
#
# Requires the workflow's GITHUB_TOKEN, plus implicit access to ghcr.io
# (granted via permissions: packages: write below).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write    # create the GitHub Release
  packages: write    # push to ghcr.io
  id-token: write    # for future Sigstore/cosign signing

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history — GoReleaser uses tags + commits

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - name: Set up QEMU (multi-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
