name: release

# Triggered by git tags matching v*.*.* (e.g. v0.1.0, v1.2.3-rc1).
# Produces:
#   - Tarball binaries for darwin-{amd64,arm64} + linux-{amd64,arm64}
#   - Multi-arch container image at ghcr.io/<org>/agentic-sre:<tag>
#   - GitHub Release with checksums + autogenerated changelog
#
# Requires the workflow's GITHUB_TOKEN, plus implicit access to ghcr.io
# (granted via permissions: packages: write below).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write    # create the GitHub Release
  packages: write    # push to ghcr.io
  id-token: write    # OIDC token for keyless Sigstore/cosign signing (P6.2)

jobs:
  release:
    runs-on: ubuntu-latest
    # 120 minutes — multi-arch buildx (linux/amd64 + linux/arm64) for both
    # Docker Hub and GHCR. The 60-min cap from v1.6.0 era was too tight:
    # v1.11.1-v1.12.2 were clocking 54-55min steady-state, and v1.12.3
    # tipped over to 60m1s and got killed mid-build. 120min gives 2×
    # headroom for transient ghcr.io / Docker Hub slowness without
    # re-tagging the world.
    timeout-minutes: 120
    steps:
      # v1.25.1 — multi-arch docker buildx OOMs on the GH-hosted runner's
      # ~14 GiB free; v1.25.0 failed with "no space left on device" when
      # the AWS SDK v2 + k8s.io deps + buildx cache filled the disk.
      # Pre-strip ~25 GiB of preinstalled toolchains that this workflow
      # doesn't use (.NET / Android SDK / Haskell / Swift / CodeQL).
      # Same pattern that fixed the Srenix Enterprise release workflow in v1.20.0.
      - name: Free disk space (multi-arch docker buildx)
        run: |
          set -euo pipefail
          echo "Disk before cleanup:"; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          sudo apt-get clean || true
          echo "Disk after cleanup:"; df -h /

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history — GoReleaser uses tags + commits

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - name: Set up QEMU (multi-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Supply-chain tooling for the GoReleaser sboms/signs/docker_signs pipes
      # (P6.2). syft generates the CycloneDX SBOMs; cosign does the keyless
      # (Fulcio/Rekor) blob + image signing using the workflow's OIDC token.
      - name: Install Syft (CycloneDX SBOM generation)
        uses: anchore/sbom-action/download-syft@v0

      - name: Install Cosign (keyless image + checksum signing)
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # --parallelism 1 serializes the per-target Go builds. The v1.8
          # binary's dependency graph grew substantially (controller-runtime
          # + google.golang.org/api + azure-sdk-for-go), and GoReleaser's
          # default parallelism (= NumCPU) ran all 6 cross-compile targets
          # at once, OOM-killing the hosted runner during the v1.8.0 release
          # (run 26553916530 died at ~8m with no GoReleaser error — the
          # signature of a kernel OOM kill). Serializing bounds peak memory
          # to a single Go build; the 60-min timeout has ample headroom.
          #
          # --timeout 2h: GoReleaser's internal top-level timeout defaults to
          # 1h. Multi-arch buildx + the new SBOM (sboms) and keyless cosign
          # (signs + docker_signs) pipes can push total wall-time past 1h on
          # busy hosted runners; 2h gives headroom without re-tagging.
          args: release --clean --parallelism 1 --timeout 2h
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
