name: release

# Triggered by git tags matching v*.*.* (e.g. v0.1.0, v1.2.3-rc1).
# Produces:
#   - Tarball binaries for darwin-{amd64,arm64} + linux-{amd64,arm64}
#   - Multi-arch container image at ghcr.io/<org>/cluster-health-autopilot:<tag>
#   - GitHub Release with checksums + autogenerated changelog
#
# Requires the workflow's GITHUB_TOKEN, plus implicit access to ghcr.io
# (granted via permissions: packages: write below).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write    # create the GitHub Release
  packages: write    # push to ghcr.io
  id-token: write    # for future Sigstore/cosign signing

jobs:
  release:
    runs-on: ubuntu-latest
    # 120 minutes — multi-arch buildx (linux/amd64 + linux/arm64) for both
    # Docker Hub and GHCR. The 60-min cap from v1.6.0 era was too tight:
    # v1.11.1-v1.12.2 were clocking 54-55min steady-state, and v1.12.3
    # tipped over to 60m1s and got killed mid-build. 120min gives 2×
    # headroom for transient ghcr.io / Docker Hub slowness without
    # re-tagging the world.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history — GoReleaser uses tags + commits

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: true

      - name: Set up QEMU (multi-arch container builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          # --parallelism 1 serializes the per-target Go builds. The v1.8
          # binary's dependency graph grew substantially (controller-runtime
          # + google.golang.org/api + azure-sdk-for-go), and GoReleaser's
          # default parallelism (= NumCPU) ran all 6 cross-compile targets
          # at once, OOM-killing the hosted runner during the v1.8.0 release
          # (run 26553916530 died at ~8m with no GoReleaser error — the
          # signature of a kernel OOM kill). Serializing bounds peak memory
          # to a single Go build; the 60-min timeout has ample headroom.
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
