# Bundle-smoke — end-to-end OLM install of the srenix-operator on a kind
# cluster. Catches three classes of regression that pure unit tests
# can't:
#   1. The CSV doesn't validate against OLM's admission webhooks
#      (typos in installModes, missing required fields, etc.).
#   2. The bundle image is malformed (wrong COPY paths, missing
#      annotations LABEL, etc.).
#   3. The operator binary doesn't reconcile a fresh CR to Ready=True
#      end-to-end with the operator-provisioned reader RBAC (Phase 1c
#      slice A) actually applied by OLM.
#
# Cost gate — this job is ~10 minutes when it runs. To keep PRs that
# don't touch the operator/bundle fast, the workflow triggers only on:
#   - pushes to main (post-merge sanity)
#   - tag pushes v*.*.* (release smoke)
#   - PRs that change anything under bundle/ OR the operator package /
#     manager binary / chart's operator-deployment.yaml
# Manual workflow_dispatch is also wired for ad-hoc runs.
name: bundle-smoke

on:
  workflow_dispatch: {}
  push:
    tags: ["v*.*.*", "v*.*.*-*"]

# Single in-flight run per ref. A new push cancels the prior — bundle
# smoke is slow + idempotent, so old runs are just wasted minutes.
concurrency:
  group: bundle-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: OLM bundle smoke on kind
    runs-on: ubuntu-latest
    # Hard budget: the bundle install is the slow step (OLM catalog
    # registration + waiting for InstallPlan + CSV phase transitions).
    # 20 min covers it with margin; anything beyond is a hang worth
    # paging.
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the operator + watcher binary image. The Dockerfile at
      # the repo root produces a single image carrying BOTH /srenix and
      # /srenix-operator binaries; the operator-deployment overrides the
      # default command to /srenix-operator.
      - name: Build operator image
        run: |
          docker build -t agentic-sre:smoke .

      # Build the OLM bundle image (scratch + COPY manifests/metadata).
      - name: Build bundle image
        run: |
          docker build -t srenix-operator-bundle:smoke -f bundle.Dockerfile .

      # Patch the CSV's deployment image to the local smoke tag BEFORE
      # the bundle is consumed. The CSV ships pointing at the public
      # docker4zerocool tag; the smoke test points at the locally-built
      # image so we don't depend on a registry. The bundle image already
      # has the unpatched CSV baked in, so rebuild it with the patched
      # CSV — easier than mounting a patched manifests/ dir into the
      # registry pod.
      - name: Patch CSV image to smoke tag + rebuild bundle
        run: |
          # The CSV ships pointing at the public docker4zerocool tag;
          # the smoke test points at a locally-pushed registry tag so
          # the kubelet on the kind node can pull it without internet.
          # Keep the registry-host portion in lockstep with the value
          # used in the `Start local registry` + `kind cluster …
          # extraConfig` steps below.
          sed -i 's|docker4zerocool/agentic-sre:1\.9\.[0-9]\+|localhost:5001/agentic-sre:smoke|g' \
              bundle/manifests/srenix.clusterserviceversion.yaml
          docker build -t srenix-operator-bundle:smoke -f bundle.Dockerfile .

      - name: Install kind
        run: |
          KIND_VERSION=v0.24.0
          curl -fsSL -o kind \
            "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      # `operator-sdk run bundle` requires a CANONICAL (registry-qualified)
      # bundle image reference AND in-cluster pull access. `kind load
      # docker-image` puts the bundle on the kind node, but the OLM
      # bundle-registry pod still issues a `docker pull` against the
      # image's registry — so we need an actual registry the cluster
      # can reach. Standard kind-with-local-registry pattern:
      #   https://kind.sigs.k8s.io/docs/user/local-registry/
      - name: Start local registry
        run: |
          docker run -d --restart=always -p 127.0.0.1:5001:5000 \
            --name kind-registry registry:2

      - name: Create kind cluster wired to the local registry
        run: |
          # Inline kind config: tells containerd on the kind node to
          # alias the published `localhost:5001` registry to the
          # in-network DNS name `kind-registry:5000` (we attach the
          # container to the kind network in the next step).
          cat > /tmp/kind-config.yaml <<EOF
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          name: bundle-smoke
          containerdConfigPatches:
            - |-
              [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
                endpoint = ["http://kind-registry:5000"]
          nodes:
            - role: control-plane
          EOF
          kind create cluster --config /tmp/kind-config.yaml --wait 60s
          # Connect the registry to the kind docker network so kind
          # nodes resolve `kind-registry` and pull from it.
          docker network connect kind kind-registry || true
          # Document the registry in the cluster for tooling that
          # honors the kind-of-registry-aware ConfigMap convention.
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: local-registry-hosting
            namespace: kube-public
          data:
            localRegistryHosting.v1: |
              host: "localhost:5001"
              help: "https://kind.sigs.k8s.io/docs/user/local-registry/"
          EOF

      - name: Push operator + bundle images to the local registry
        run: |
          docker tag agentic-sre:smoke localhost:5001/agentic-sre:smoke
          docker tag srenix-operator-bundle:smoke      localhost:5001/srenix-operator-bundle:smoke
          docker push localhost:5001/agentic-sre:smoke
          docker push localhost:5001/srenix-operator-bundle:smoke

      - name: Install operator-sdk
        run: |
          # operator-sdk v1.37+ supports OLM v0.28; pinning a specific
          # release so a future operator-sdk default change can't break
          # this workflow silently.
          OPERATOR_SDK_VERSION=v1.37.0
          curl -fsSL -o operator-sdk \
            "https://github.com/operator-framework/operator-sdk/releases/download/${OPERATOR_SDK_VERSION}/operator-sdk_linux_amd64"
          chmod +x operator-sdk
          sudo mv operator-sdk /usr/local/bin/operator-sdk
          operator-sdk version

      - name: Validate bundle locally (catches malformed CSV / metadata)
        run: |
          operator-sdk bundle validate ./bundle

      - name: Install OLM on kind
        run: |
          # `operator-sdk olm install` deploys the OLM control plane
          # (PackageManifest, ClusterServiceVersion, Subscription,
          # InstallPlan CRDs + the catalog-operator + olm-operator
          # Deployments). ~90s on kind.
          #
          # PIN the OLM version: without --version the installer fetches
          # releases/latest/download/{crds,olm}.yaml, and upstream OLM's
          # latest release (v0.45.0) no longer ships those YAML assets —
          # the download 404s and the install hard-fails. v0.44.0 is the
          # newest release that still publishes crds.yaml + olm.yaml.
          # Bump deliberately after verifying the new tag's assets.
          operator-sdk olm install --version 0.44.0 --timeout=5m
          # `operator-sdk olm install` also installs the upstream
          # `operatorhubio-catalog` CatalogSource that points at
          # quay.io's catalog registry. Our bundle has zero
          # dependencies on operatorhubio — but OLM's resolver
          # consults every CatalogSource in the cluster when
          # generating an InstallPlan, and a flaky/unreachable
          # operatorhubio-catalog gRPC pod causes
          # `ResolutionFailed/ErrorPreventedResolution` and the
          # InstallPlan never appears (we hit a 10-min context
          # deadline on the Subscription). Delete the upstream
          # catalog up-front so the resolver only sees ours.
          kubectl delete catalogsource operatorhubio-catalog -n olm --ignore-not-found

      - name: Create install namespace
        run: |
          kubectl create namespace srenix-system

      - name: Run the bundle
        run: |
          # `operator-sdk run bundle` pushes a one-off CatalogSource +
          # Subscription that installs the bundle into the namespace,
          # then waits for the CSV to reach Succeeded. `--use-http`
          # tells the registry pod to pull via plain HTTP (the local
          # registry isn't TLS'd; production users override the bundle
          # ref to an HTTPS registry).
          operator-sdk run bundle localhost:5001/srenix-operator-bundle:smoke \
            --namespace srenix-system \
            --install-mode OwnNamespace \
            --use-http \
            --timeout 10m

      - name: Show operator state
        run: |
          kubectl -n srenix-system get deploy,po
          kubectl -n srenix-system get csv -o yaml | head -120

      - name: Apply sample AgenticSRE CR
        run: |
          kubectl apply -f bundle/tests/sample-cr.yaml

      - name: Wait for the CR to reach Ready=True
        run: |
          # The operator reconciles, provisions the reader RBAC, creates
          # the watcher Deployment, and computes ReaderRBACReady +
          # WatcherRunning. Ready=True means BOTH gate-conditions are
          # met AND no reconcile error.
          kubectl -n srenix-system wait agenticsre/smoke \
            --for=condition=Ready=true --timeout=5m

      - name: Verify operator-provisioned reader RBAC (Phase 1c slice A)
        run: |
          # The reader ClusterRole + per-CR ClusterRoleBinding must exist
          # AND the binding must target the operator-created SA. This
          # ratifies that slice A's code-path actually fired end-to-end
          # under OLM (not just in unit tests).
          kubectl get clusterrole srenix-operator-watcher-reader
          kubectl get clusterrolebinding srenix-operator-watcher-srenix-system-smoke \
            -o jsonpath='{.subjects[0].name}' | grep -q '^smoke-sa$'

      # ── Phase 2+ smoke (AI + approval-server objects) ──────────────────
      # Purpose: verify the operator creates the full AI stack objects and
      # runs the reconciler successfully (no InvalidSpec / ReconcileError).
      # We do NOT wait for Ready=True because the smoke image is the OSS
      # binary, not srenix-enterprise — aiwatch/approval pods stay in ErrImagePull.
      # What we verify is that the operator exercised ALL reconcile code
      # paths (Phase 2 aiwatch, Phase 2b Qdrant, Phase 2c approval-server
      # RBAC + signing-key) without hitting a 403 or a validation error.
      - name: Apply Phase 2+ sample CR (AI + approval-server enabled)
        run: |
          kubectl apply -f bundle/tests/sample-cr-ai.yaml

      - name: Wait for Phase 2+ CR to appear in status
        run: |
          # We wait for the CR to have ANY status condition set (meaning
          # the operator reconciled it at least once) rather than Ready=True
          # (the srenix-enterprise pods won't start with the OSS smoke image).
          # A 60s poll is sufficient — the operator reconciles within seconds
          # of the CR being created.
          for i in $(seq 1 12); do
            CONDITIONS=$(kubectl -n srenix-system get agenticsre/smoke-ai \
              -o jsonpath='{.status.conditions}' 2>/dev/null || echo "")
            if [ -n "$CONDITIONS" ] && [ "$CONDITIONS" != "null" ] && [ "$CONDITIONS" != "[]" ]; then
              echo "Status conditions set: $CONDITIONS"
              break
            fi
            echo "Waiting for reconcile... ($i/12)"
            sleep 5
          done

      - name: Verify Phase 2+ objects created by the operator
        run: |
          # approval-server ServiceAccount
          kubectl -n srenix-system get serviceaccount smoke-ai-approval-server
          # approval-server Service
          kubectl -n srenix-system get service smoke-ai-approval-server
          # approval-server Deployment (may not be running, but must exist)
          kubectl -n srenix-system get deployment smoke-ai-approval-server
          # signing-key Secret — MUST have both PEM keys (the operator
          # generates the Ed25519 keypair at reconcile time)
          SIGNING_KEY=$(kubectl -n srenix-system get secret srenix-approval-signing-key \
            -o jsonpath='{.data.signing\.key}' 2>/dev/null || echo "")
          if [ -z "$SIGNING_KEY" ]; then
            echo "FAIL: signing-key Secret missing signing.key"
            exit 1
          fi
          SIGNING_PUB=$(kubectl -n srenix-system get secret srenix-approval-signing-key \
            -o jsonpath='{.data.signing\.pub}' 2>/dev/null || echo "")
          if [ -z "$SIGNING_PUB" ]; then
            echo "FAIL: signing-key Secret missing signing.pub"
            exit 1
          fi
          echo "PASS: signing-key Secret has both PEM keys"
          # approval-fixer ClusterRoleBinding (cluster-scoped, per-CR)
          kubectl get clusterrolebinding srenix-operator-approval-fixer-srenix-system-smoke-ai \
            -o jsonpath='{.subjects[0].name}' | grep -q '^smoke-ai-approval-server$'
          echo "PASS: fixer ClusterRoleBinding targets approval-server SA"
          # approval-fixer ClusterRole (shared, created by operator)
          kubectl get clusterrole srenix-operator-approval-fixer
          echo "PASS: fixer ClusterRole exists"
          # aiwatch Deployment (may not be running, but must exist)
          kubectl -n srenix-system get deployment smoke-ai-aiwatch

      - name: Verify no InvalidSpec / ReconcileError condition on Phase 2+ CR
        run: |
          # If the operator hit a validation error (e.g., missing required
          # field, bad RBAC verb) it would set Ready=False/InvalidSpec or
          # Ready=False/ReconcileError. Either means a regression in the
          # Phase 2+ reconcile path. ApprovalServerReady=False/
          # NoAvailableReplicas is acceptable (pods can't start with smoke
          # image), but InvalidSpec or ReconcileError is a hard failure.
          READY_REASON=$(kubectl -n srenix-system get agenticsre/smoke-ai \
            -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || echo "NotSet")
          echo "Ready.reason = $READY_REASON"
          if [ "$READY_REASON" = "InvalidSpec" ] || [ "$READY_REASON" = "ReconcileError" ]; then
            READY_MSG=$(kubectl -n srenix-system get agenticsre/smoke-ai \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].message}' 2>/dev/null)
            echo "FAIL: Ready.reason=$READY_REASON message=$READY_MSG"
            exit 1
          fi
          echo "PASS: no InvalidSpec or ReconcileError on Phase 2+ CR"

      # ── Full-surface pruning smoke (P1.4) ──────────────────────────────
      # v1.24.0 shipped with the installed CRD missing spec.watcher.triggers
      # — schema-strict apiservers silently PRUNED the subtree from applied
      # CRs and nothing in CI noticed. sample-cr-full.yaml sets EVERY
      # optional spec subtree (all master-switches off, fake secret refs);
      # reading the deep fields back catches a bundle CRD that lost a
      # subtree relative to the Go types / chart CRD.
      - name: Apply full-surface sample CR (pruning detection)
        run: |
          kubectl apply -f bundle/tests/sample-cr-full.yaml

      - name: Verify no spec subtree was pruned by the installed CRD schema
        run: |
          check() {
            local path="$1"
            local got
            got=$(kubectl -n srenix-system get agenticsre/smoke-full \
              -o jsonpath="{${path}}" 2>/dev/null || echo "")
            if [ -z "$got" ]; then
              echo "FAIL: ${path} came back EMPTY — the installed CRD schema is missing this subtree and the apiserver pruned it (the v1.24.0 bug class). Hand-port the missing subtree into bundle/manifests/srenix.ai_agenticsres.yaml from the chart CRD."
              exit 1
            fi
            echo "PASS: ${path} = ${got}"
          }
          # One deep leaf per optional subtree — a pruned ancestor empties
          # every leaf under it.
          check ".spec.watcher.triggers.prom.url"
          check ".spec.watcher.triggers.webhook.listen"
          check ".spec.watcher.triggers.webhook.sources"
          check ".spec.externalDNS.cloudflare.apiTokenSecretRef.name"
          check ".spec.externalDNS.cloudflare.zoneIDs"
          check ".spec.alerting.slack.healthInfo.secretName"
          check ".spec.alerting.alertmanager.url"
          check ".spec.ai.digestPinAttestation.secretName"
          check ".spec.ai.metrics.addr"
          check ".spec.ai.memory.embeddings.model"
          check ".spec.ai.extraEnv[1].valueFrom.secretKeyRef.name"
          check ".spec.approval.store.replayConfigMap"
          check ".spec.approval.ingress.tls.secretName"
          check ".spec.ticketing.severityPriority.critical"
          check ".spec.ticketing.auth.secretName"
          echo "PASS: no subtree pruned — installed CRD schema covers the full spec surface"

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          echo "=== CSVs ==="
          kubectl -n srenix-system get csv -o yaml
          echo "=== Operator pod logs ==="
          kubectl -n srenix-system logs deploy/srenix-operator --tail=200 || true
          echo "=== CR + conditions (watcher) ==="
          kubectl -n srenix-system get agenticsre/smoke -o yaml || true
          echo "=== CR + conditions (AI+approval) ==="
          kubectl -n srenix-system get agenticsre/smoke-ai -o yaml || true
          echo "=== CR as stored (full-surface pruning sample) ==="
          kubectl -n srenix-system get agenticsre/smoke-full -o yaml || true
          echo "=== approval-server objects ==="
          kubectl -n srenix-system get deploy,svc,sa,secret -l app.kubernetes.io/instance=smoke-ai || true
          kubectl get clusterrolebinding -l srenix.ai/managed-by-cr=smoke-ai || true
          echo "=== InstallPlans ==="
          kubectl -n srenix-system get installplans -o yaml || true
          echo "=== Subscriptions ==="
          kubectl -n srenix-system get subscriptions -o yaml || true
          echo "=== All events ==="
          kubectl -n srenix-system get events --sort-by=.lastTimestamp | tail -50
