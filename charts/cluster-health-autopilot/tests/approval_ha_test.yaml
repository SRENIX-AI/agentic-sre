suite: approval-server HA store backend (G10)
templates:
  - templates/approval-server-deployment.yaml
tests:
  - it: inmemory default — no --store-* args, Recreate strategy
    set:
      approval.enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--store-backend=inmemory"
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--store-backend=configmap"
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: configmap backend — args emitted + RollingUpdate strategy
    set:
      approval.enabled: true
      approval.store.backend: configmap
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--store-backend=configmap"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--store-replay-configmap=cha-approval-replay"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--store-runbook-configmap=cha-approval-runbooks"
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: configmap backend — operator-supplied namespace + custom CM names
    set:
      approval.enabled: true
      approval.store.backend: configmap
      approval.store.namespace: cha-shared
      approval.store.replayConfigMap: my-replay
      approval.store.runbookConfigMap: my-runbooks
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--store-namespace=cha-shared"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--store-replay-configmap=my-replay"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--store-runbook-configmap=my-runbooks"
