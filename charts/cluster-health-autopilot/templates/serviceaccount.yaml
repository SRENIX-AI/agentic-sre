{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cha.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cha.labels" . | nindent 4 }}
  {{- $needsAnnotations := or
    (.Values.serviceAccount.annotations)
    (and .Values.cloud.enabled .Values.cloud.aws.enabled (eq (default "irsa" .Values.cloud.aws.auth.mode) "irsa") .Values.cloud.aws.auth.roleArn)
    (and .Values.cloud.enabled .Values.cloud.gcp.enabled (eq (default "workloadIdentity" .Values.cloud.gcp.auth.mode) "workloadIdentity") .Values.cloud.gcp.auth.serviceAccount)
    (and .Values.cloud.enabled .Values.cloud.azure.enabled (eq (default "workloadIdentity" .Values.cloud.azure.auth.mode) "workloadIdentity") .Values.cloud.azure.auth.clientId)
  }}
  {{- if $needsAnnotations }}
  annotations:
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if and .Values.cloud.enabled .Values.cloud.aws.enabled (eq (default "irsa" .Values.cloud.aws.auth.mode) "irsa") .Values.cloud.aws.auth.roleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.cloud.aws.auth.roleArn | quote }}
    {{- end }}
    {{- if and .Values.cloud.enabled .Values.cloud.gcp.enabled (eq (default "workloadIdentity" .Values.cloud.gcp.auth.mode) "workloadIdentity") .Values.cloud.gcp.auth.serviceAccount }}
    iam.gke.io/gcp-service-account: {{ .Values.cloud.gcp.auth.serviceAccount | quote }}
    {{- end }}
    {{- if and .Values.cloud.enabled .Values.cloud.azure.enabled (eq (default "workloadIdentity" .Values.cloud.azure.auth.mode) "workloadIdentity") .Values.cloud.azure.auth.clientId }}
    azure.workload.identity/client-id: {{ .Values.cloud.azure.auth.clientId | quote }}
    {{- end }}
  {{- end }}
{{- end }}
