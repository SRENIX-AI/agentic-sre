{{- if .Values.remediation.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "cha.fullname" . }}-remediate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cha.labels" . | nindent 4 }}
    cha.bionicaisolutions.com/role: remediate
spec:
  schedule: {{ .Values.remediation.schedule | quote }}
  concurrencyPolicy: {{ .Values.remediation.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.remediation.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.remediation.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "cha.selectorLabels" . | nindent 12 }}
            cha.bionicaisolutions.com/role: remediate
        spec:
          serviceAccountName: {{ include "cha.serviceAccountName" . }}
          restartPolicy: OnFailure
          {{- with .Values.image.pullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.priorityClassName }}
          priorityClassName: {{ . }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: cha
              image: {{ include "cha.image" . }}
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              args:
                - remediate
                - --live
                {{- if .Values.remediation.dryRun }}
                - --dry-run
                {{- end }}
              env:
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
{{- end }}
