{{- if (.Values.operator).installCRD }}
# ClusterHealthAutopilot CRD — phase-1 operator foundation.
#
# One CR per CHA install. The cha-operator binary (Phase 2) will
# reconcile this CR into the watcher Deployment, diagnose/remediate
# CronJobs, ServiceAccount, and the existing ClusterRole bindings.
#
# Phase 1 ships the CRD shape only. The reconcile loop lands in the
# next PR. Installing this CRD on a cluster without the operator
# binary is harmless: the resource is just queryable state with no
# controller yet.
#
# Schema is intentionally a thin x-kubernetes-preserve-unknown-fields
# envelope at the leaves — the Go types
# (api/v1alpha1/clusterhealthautopilot_types.go) are the source of
# truth and the controller's typed builder validates inputs.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: clusterhealthautopilots.cha.bionicaisolutions.com
  labels:
    {{- include "cha.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: cha.bionicaisolutions.com
  scope: Namespaced
  names:
    kind: ClusterHealthAutopilot
    plural: clusterhealthautopilots
    singular: clusterhealthautopilot
    shortNames:
      - cha
    categories:
      - cha
      - cluster-health
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - image
              properties:
                image:
                  type: object
                  required:
                    - repository
                    - tag
                  properties:
                    repository:
                      type: string
                      minLength: 1
                    tag:
                      type: string
                      minLength: 1
                    pullPolicy:
                      type: string
                      enum: ["", "Always", "IfNotPresent", "Never"]
                    pullSecrets:
                      type: array
                      items:
                        type: string
                serviceAccountName:
                  type: string
                watcher:
                  type: object
                  required:
                    - enabled
                  properties:
                    enabled:
                      type: boolean
                    replicas:
                      type: integer
                      minimum: 0
                    debounce:
                      type: string
                    resyncPeriod:
                      type: string
                    # v1.24.1 — external trigger sources (M5 + M6).
                    triggers:
                      type: object
                      properties:
                        prom:
                          type: object
                          required: [url]
                          properties:
                            url:
                              type: string
                              minLength: 1
                            interval:
                              type: string
                            alertNameFilter:
                              type: array
                              items:
                                type: string
                        webhook:
                          type: object
                          required: [listen]
                          properties:
                            listen:
                              type: string
                              minLength: 1
                            sources:
                              type: array
                              items:
                                type: string
                            secretName:
                              type: string
                            serviceEnabled:
                              type: boolean
                            servicePort:
                              type: integer
                              minimum: 1
                              maximum: 65535
                diagnose:
                  type: object
                  required:
                    - enabled
                  properties:
                    enabled:
                      type: boolean
                    schedule:
                      type: string
                    backoffLimit:
                      type: integer
                      minimum: 0
                    activeDeadlineSeconds:
                      type: integer
                      minimum: 0
                remediate:
                  type: object
                  required:
                    - enabled
                  properties:
                    enabled:
                      type: boolean
                    schedule:
                      type: string
                    dryRun:
                      type: boolean
                    # v1.25.1 — per-Job wall-clock budget (default 120s).
                    activeDeadlineSeconds:
                      type: integer
                      minimum: 0
                alerting:
                  type: object
                  properties:
                    slack:
                      type: object
                      properties:
                        alerts:
                          type: object
                          required: [secretName]
                          properties:
                            secretName:
                              type: string
                              minLength: 1
                            secretKey:
                              type: string
                        critical:
                          type: object
                          required: [secretName]
                          properties:
                            secretName:
                              type: string
                              minLength: 1
                            secretKey:
                              type: string
                        healthInfo:
                          type: object
                          required: [secretName]
                          properties:
                            secretName:
                              type: string
                              minLength: 1
                            secretKey:
                              type: string
                    alertmanager:
                      type: object
                      required:
                        - url
                        - clusterName
                      properties:
                        url:
                          type: string
                          minLength: 1
                        clusterName:
                          type: string
                          minLength: 1
                ai:
                  # AISpec — CHA-com paid-tier AI watcher + optional
                  # in-namespace Qdrant. Reconciled by Phase 2 / 2b
                  # (aiwatch Deployment + Qdrant StatefulSet/Service).
                  # The approval-server URL the aiwatch points at sits
                  # here at `approvalServerUrl`; the approval-server
                  # SPEC (Deployment, Service, RBAC, signing key, etc.)
                  # lives under `spec.approval` below.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    tier:
                      type: string
                      enum: [off, t0, t1, t2, t3]
                    endpoint:
                      type: string
                    model:
                      type: string
                    interval:
                      type: string
                    allowSaas:
                      type: boolean
                    llmFixerMatcher:
                      type: boolean
                    auditLog:
                      type: string
                    approvalServerUrl:
                      type: string
                    image:
                      type: object
                      properties:
                        repository:
                          type: string
                        tag:
                          type: string
                        pullPolicy:
                          type: string
                        pullSecrets:
                          type: array
                          items:
                            type: string
                    apiKey:
                      type: object
                      properties:
                        secretName:
                          type: string
                        secretKey:
                          type: string
                        envName:
                          type: string
                        header:
                          type: string
                    t3:
                      type: object
                      properties:
                        vaultAllowedPrefixes:
                          type: array
                          items:
                            type: string
                    memory:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        image:
                          type: object
                          properties:
                            repository:
                              type: string
                            tag:
                              type: string
                            pullPolicy:
                              type: string
                            pullSecrets:
                              type: array
                              items:
                                type: string
                        storage:
                          type: object
                          properties:
                            size:
                              type: string
                            className:
                              type: string
                        embeddings:
                          type: object
                          properties:
                            endpoint:
                              type: string
                            model:
                              type: string
                        storeUrl:
                          type: string
                        topK:
                          type: integer
                          minimum: 0
                    extraArgs:
                      # v1.18.0 — escape hatch for cha-com flags not yet
                      # modeled as typed fields (e.g. --cloudflare-feeder,
                      # --rag-store-url, --digest-pin-proposer,
                      # --digest-pin-repo-map). Appended verbatim AFTER
                      # the typed args.
                      type: array
                      items:
                        type: string
                    extraEnv:
                      # v1.18.0 — escape hatch for env vars not yet modeled
                      # (e.g. GITHUB_PAT for digest-pin forge calls,
                      # CLOUDFLARE_API_TOKEN for the zone-feeder). Each
                      # entry has Name + (Value XOR ValueFrom.SecretKeyRef).
                      type: array
                      items:
                        type: object
                        required: [name]
                        properties:
                          name:
                            type: string
                            minLength: 1
                          value:
                            type: string
                          valueFrom:
                            type: object
                            properties:
                              secretKeyRef:
                                type: object
                                required: [name, key]
                                properties:
                                  name:
                                    type: string
                                    minLength: 1
                                  key:
                                    type: string
                                    minLength: 1
                    replicas:
                      # v1.21.0 (Phase 2.F) — HA aiwatch via lease-based
                      # leader election. Default 1 (noop path, byte-
                      # identical to pre-2.F). When >1, the chart turns on
                      # --leader-election and binds the SA to the Lease
                      # Role; exactly one replica runs tick() at a time.
                      type: integer
                      minimum: 1
                      maximum: 5
                    digestPinAttestation:
                      # v1.21.0 (Phase 2.H) — Ed25519 signing of DigestPin
                      # PR-body attestation blocks.
                      type: object
                      required: [secretName]
                      properties:
                        secretName:
                          type: string
                          minLength: 1
                        secretKey:
                          type: string
                        keyID:
                          type: string
                    metrics:
                      # v1.22.0 (Phase 3.D) — Prometheus /metrics endpoint
                      # promoted from chart-only ai.metrics into the CR so
                      # operator-managed installs (ArgoCD/Flux) don't need
                      # --metrics-addr in extraArgs.
                      type: object
                      required: [addr]
                      properties:
                        addr:
                          type: string
                          minLength: 1
                        port:
                          type: integer
                          minimum: 1
                          maximum: 65535
                    llmProposer:
                      # v1.22.0 (Phase 3.D) — typed switch for the LLM-
                      # driven fallback proposer (Phase 2.D).
                      type: object
                      required: [enabled]
                      properties:
                        enabled:
                          type: boolean
                approval:
                  # ApprovalSpec — CHA-com approval-server (in-namespace
                  # HTTPS endpoint that validates SRE approve/deny clicks
                  # on JWT-signed proposals). Schema-only in Phase 2c-A;
                  # the reconciler picks it up in Phase 2c-B.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    replicas:
                      type: integer
                      minimum: 0
                    auditNamespace:
                      type: string
                    image:
                      type: object
                      properties:
                        repository:
                          type: string
                        tag:
                          type: string
                        pullPolicy:
                          type: string
                        pullSecrets:
                          type: array
                          items:
                            type: string
                    signingKey:
                      type: object
                      properties:
                        secretName:
                          type: string
                    store:
                      type: object
                      properties:
                        backend:
                          type: string
                          enum: [inmemory, configmap]
                        namespace:
                          type: string
                        replayConfigMap:
                          type: string
                        runbookConfigMap:
                          type: string
                    ingress:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        ingressClassName:
                          type: string
                        host:
                          type: string
                        annotations:
                          type: object
                          additionalProperties:
                            type: string
                        tls:
                          type: object
                          properties:
                            enabled:
                              type: boolean
                            secretName:
                              type: string
                    networkPolicy:
                      # ApprovalNetworkPolicySpec — restricts ingress to the
                      # approval-server pods to ONLY the gateway/oauth2-proxy
                      # namespace, closing the X-Forwarded-User header-forgery
                      # bypass. Default OFF; gatewayNamespaceSelector REQUIRED
                      # when enabled (no safe default).
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        gatewayNamespaceSelector:
                          type: object
                          additionalProperties:
                            type: string
                externalDNS:
                  # ExternalDNSSpec — DNS-chain drift analyzer's optional
                  # Cloudflare integration. Schema-only if the watcher image
                  # predates v1.10; the analyzer reads it at registration time.
                  type: object
                  properties:
                    cloudflare:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        apiTokenSecretRef:
                          type: object
                          required: [name]
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                        zoneIDs:
                          type: array
                          items:
                            type: string
                        expectedTargets:
                          type: array
                          items:
                            type: string
                ticketing:
                  # TicketingSpec — Phase 1.D. Operator-managed wiring
                  # for the issue-tracker sink (OpenProject in OSS;
                  # Jira / ServiceNow in CHA-com). Set Enabled=true and
                  # the operator passes the matching --ticketing-*
                  # flags to the watcher container.
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    provider:
                      type: string
                      enum: [openproject, jira, servicenow]
                    cluster:
                      type: string
                    mcpURL:
                      type: string
                    project:
                      type: string
                    typeID:
                      type: string
                    closedStatusID:
                      type: string
                    webURLPrefix:
                      type: string
                    severityPriority:
                      type: object
                      properties:
                        critical:
                          type: string
                        warning:
                          type: string
                        info:
                          type: string
                    labels:
                      type: array
                      items:
                        type: string
                    dryRun:
                      type: boolean
                    resolveOnClear:
                      type: boolean
                      description: |
                        Auto-close the ticket when its finding clears (M2).
                        Omit to default ON; set false to disable.
                    commentInterval:
                      type: string
                      description: |
                        Debounce window (Go duration, e.g. "1h") for
                        comment-on-recurrence (M2). "0" disables it.
                    auth:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                        secretName:
                          type: string
                        secretKey:
                          type: string
                    # CHA-com ticketing sinks (Jira / ServiceNow / route).
                    # CHA-com only; the OSS operator renders these as
                    # CHA_* env on the aiwatch container. Tokens/passwords
                    # flow via secretKeyRef (the *Secret refs below) — the
                    # CRD never carries a literal credential.
                    route:
                      type: string
                    jira:
                      type: object
                      properties:
                        url:
                          type: string
                        project:
                          type: string
                        email:
                          type: string
                        issueType:
                          type: string
                        priority:
                          type: object
                          properties:
                            critical:
                              type: string
                            warning:
                              type: string
                            info:
                              type: string
                        webUrlBase:
                          type: string
                        tokenSecret:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                    servicenow:
                      type: object
                      properties:
                        url:
                          type: string
                        user:
                          type: string
                        urgency:
                          type: object
                          properties:
                            critical:
                              type: string
                            warning:
                              type: string
                            info:
                              type: string
                        impact:
                          type: object
                          properties:
                            critical:
                              type: string
                            warning:
                              type: string
                            info:
                              type: string
                        webUrlBase:
                          type: string
                        passwordSecret:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
                        bearerSecret:
                          type: object
                          properties:
                            name:
                              type: string
                            key:
                              type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                observedGeneration:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
                      lastTransitionTime:
                        type: string
                      observedGeneration:
                        type: integer
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Watcher
          type: string
          jsonPath: .status.conditions[?(@.type=="WatcherRunning")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
{{- end }}
