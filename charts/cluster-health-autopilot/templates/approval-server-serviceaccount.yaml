{{- if .Values.approval.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cha.fullname" . }}-approval-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cha.labels" . | nindent 4 }}
    cha.bionicaisolutions.com/role: approval-server
  annotations:
    cha.bionicaisolutions.com/purpose: >-
      Approval-server sidecar ServiceAccount. Holds the JWT signing key
      via a Secret mount that the watcher SA cannot read.
{{- end }}
