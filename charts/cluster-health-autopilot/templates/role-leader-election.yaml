{{- if .Values.watcher.leaderElection.enabled }}
# Sprint 4.3 — leader-election Lease coordination.
# Scoped to the install namespace and to a single named Lease so the
# blast radius is minimal: this Role can only manage the cha-watcher
# lease, not any other Lease in the namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cha.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cha.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames:
      - {{ .Values.watcher.leaderElection.leaseName | quote }}
    verbs: ["get", "list", "watch", "update", "patch"]
  # create is unscoped — the Lease has to exist before resourceNames can
  # match against it on first acquisition.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cha.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cha.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cha.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "cha.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
