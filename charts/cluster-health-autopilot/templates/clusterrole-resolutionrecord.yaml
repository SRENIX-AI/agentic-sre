{{- if (.Values.resolutionRecord).enabled }}
# ResolutionRecord ClusterRole.
#
# Create: the recorder appends a CR per verified remediation outcome.
# Get/List/Watch: the RAG memory layer reads records to (re-)build the
# vector index. Status patch: the RAG layer stamps embeddedAt/vectorId
# after embedding. No delete — records are append-only (retention is
# handled out-of-band).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cha.fullname" . }}-resolutionrecord
  labels:
    {{- include "cha.labels" . | nindent 4 }}
rules:
  - apiGroups: ["cha.bionicaisolutions.com"]
    resources: ["resolutionrecords"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: ["cha.bionicaisolutions.com"]
    resources: ["resolutionrecords/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cha.fullname" . }}-resolutionrecord
  labels:
    {{- include "cha.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cha.fullname" . }}-resolutionrecord
subjects:
  - kind: ServiceAccount
    name: {{ include "cha.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
