{{- if and .Values.approval.enabled .Values.gatekeeper.install }}
# gatekeeper-constraint.yaml
#
# Defense-in-depth admission policy. Even after a signed approval token
# is verified by the approval-server, this Gatekeeper ConstraintTemplate
# independently rejects any mutation against a protected namespace if
# the request originates from a CHA ServiceAccount.
#
# Why a third gate (after LLM-validator + approver):
#   - LLM could be wrong about a target's namespace
#   - Approver could miss a typo
#   - Audit trail without enforcement is just history
# Gatekeeper makes "protected NS is never touched" a cluster invariant
# even when the prior gates would have allowed it.
#
# Requires: OPA Gatekeeper installed in the cluster.
#   helm install gatekeeper gatekeeper/gatekeeper --create-namespace -n gatekeeper-system
---
apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: chaprotectedns
  labels:
    {{- include "cha.labels" . | nindent 4 }}
spec:
  crd:
    spec:
      names:
        kind: CHAProtectedNS
      validation:
        openAPIV3Schema:
          type: object
          properties:
            protectedNamespaces:
              type: array
              items:
                type: string
            allowedUsernames:
              type: array
              items:
                type: string
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package cha.protectedns

        violation[{"msg": msg}] {
          # Only enforce against requests from cha service accounts.
          input.review.userInfo.username == username
          startswith(username, "system:serviceaccount:")
          some allowed_idx
          input.parameters.allowedUsernames[allowed_idx] == username

          # Reject any DELETE or PATCH against a protected namespace.
          input.review.namespace == ns
          some np_idx
          input.parameters.protectedNamespaces[np_idx] == ns

          op := input.review.operation
          op != "CREATE"

          msg := sprintf("CHA approval-server cannot %s resources in protected namespace %q (rejected by chaprotectedns Gatekeeper policy)", [op, ns])
        }

        username := input.review.userInfo.username
        ns := input.review.namespace
---
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: CHAProtectedNS
metadata:
  name: cha-protected-namespaces
  labels:
    {{- include "cha.labels" . | nindent 4 }}
spec:
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
      - apiGroups: ["batch"]
        kinds: ["Job"]
      - apiGroups: ["apps"]
        kinds: ["Deployment"]
      - apiGroups: ["cert-manager.io"]
        kinds: ["CertificateRequest"]
      - apiGroups: ["acme.cert-manager.io"]
        kinds: ["Order"]
  parameters:
    protectedNamespaces:
      {{- range .Values.gatekeeper.constraints.protectedNamespaces }}
      - {{ . | quote }}
      {{- end }}
    allowedUsernames:
      - system:serviceaccount:{{ .Release.Namespace }}:{{ include "cha.fullname" . }}-approval-server
      - system:serviceaccount:{{ .Release.Namespace }}:{{ include "cha.serviceAccountName" . }}
{{- end }}
