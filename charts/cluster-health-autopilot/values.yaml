# Default values for cluster-health-autopilot.
#
# Two CronJobs are templated:
#   1. diagnose   — read-only probes + analyzers, ALWAYS enabled.
#   2. remediate  — runs the whitelisted auto-fixers (live cluster mutation),
#                   OPT-IN via .Values.remediation.enabled. Off by default.

image:
  # Docker Hub is the canonical publish target. docker4zerocool is the org's
  # operational registry (same account that hosts every ai-* and mcp-*
  # image the platform depends on); no extra pull-secret config needed for
  # operators who already use it. GHCR is published as a mirror by
  # GoReleaser on every tag for operators who prefer it — flip the
  # repository value below to `ghcr.io/bionic-ai-solutions/cluster-health-autopilot`
  # to use it.
  repository: docker4zerocool/cluster-health-autopilot
  tag: ""                         # default = .Chart.appVersion (e.g. v1.6.0)
  # pullPolicy is left empty so the `cha.pullPolicy` helper picks it
  # automatically: Always for mutable tags (latest / main / dev /
  # `*-latest`) and IfNotPresent for semver-pinned tags. Override only
  # when you specifically need to force one or the other.
  pullPolicy: ""
  pullSecrets: []                 # e.g. [{name: dockerhub-secret}]

# Diagnose CronJob — always enabled.
diagnose:
  enabled: true
  schedule: "0 9 * * *"           # Daily 09:00 UTC. Same default as the bash version.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  # backoffLimit caps how many times a failed pod within the Job is retried
  # before the Job itself is marked Failed. K8s default is 6, which compounds
  # with the per-pod default of 5 minutes of backoff — a hung run can keep
  # spawning pods for over an hour. CHA's diagnose is read-only, so retry
  # adds little value over the next daily tick.
  backoffLimit: 1
  # activeDeadlineSeconds caps the Job's total runtime (counted across pod
  # restarts). A diagnose run that's stuck past 2 minutes is almost certainly
  # blocked on an unresponsive cluster API, not making progress. Failing fast
  # frees up the next scheduled tick to retry from a known-good start.
  activeDeadlineSeconds: 120
  format: daily                   # daily | text | json — daily posts to #healthinfo; text/json for ad-hoc runs

# Remediate CronJob — opt-in.
remediation:
  enabled: false
  schedule: "*/30 * * * *"        # Every 30 min. Off by default — turn on once your team trusts the fixers.
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  # See diagnose.backoffLimit comment. Remediation Jobs mutate cluster state
  # so we especially do NOT want them retrying a hung-mid-mutation run.
  backoffLimit: 1
  # See diagnose.activeDeadlineSeconds comment. Remediation runs apply the
  # whitelisted fixers and re-probe; 120s is well above the <60s wall-clock
  # the engine targets per cycle.
  activeDeadlineSeconds: 120
  dryRun: false                   # When true, fixers report Refused without mutating cluster state.

# Slack three-channel routing.
# Each channel maps to a dedicated incoming-webhook Secret.
# All URLs must come from pre-existing Secrets in the install namespace — prefer
# wiring them via External Secrets Operator from Vault (see SECURITY.md).
#
#   alerts    → #ceph-alerts:   event-driven, CHA acted (auto-fixed issues)
#   critical  → #ceph-critical: event-driven, human action required
#   healthinfo→ #healthinfo:    daily 09:00 UTC digest (diagnose CronJob)
slack:
  alerts:
    enabled: false
    secretName: ""           # e.g. "cha-slack-ceph-alerts"
    secretKey: "WEBHOOK_URL"
  critical:
    enabled: false
    secretName: ""           # e.g. "cha-slack-ceph-critical"
    secretKey: "WEBHOOK_URL"
  healthinfo:
    enabled: false
    secretName: ""           # e.g. "cha-slack-healthinfo"
    secretKey: "WEBHOOK_URL"

# DriftReport CRD — kubectl-queryable diagnostic objects.
# Each cron tick upserts one DriftReport per active diagnostic; CRs whose
# subject is no longer reported get deleted automatically. Inspect with:
#   kubectl get driftreports -A
# Disable if you don't want CRD-shaped output (Slack + JSON still work).
driftReport:
  enabled: true

# Vault-probe — closes the L1 stale-Ready window: queries Vault directly to
# verify each ExternalSecret's referenced path + property still exists, BEFORE
# the ESO controller's next refresh marks itself not-Ready. Catches the case
# where someone edits Vault but pods stay alive on cached Secret data and
# the next pod restart fails with CreateContainerConfigError.
#
# Privacy contract: cha never reads Vault byte values — only key NAMES at
# each path. Same posture as the secrets RBAC rule in clusterrole-reader.yaml.
#
# Default: disabled. Enabling requires either a Vault role bound to the cha
# ServiceAccount (kubernetes-auth, recommended) or a token in a Secret.
vaultProbe:
  enabled: false
  address: ""                     # e.g. "https://vault.svc.cluster.local:8200"
  kvMount: "secret"               # KV-v2 mount path; ESO `data[].remoteRef.key` is mount-relative
  auth:
    method: kubernetes            # kubernetes | token
    role: ""                      # required when method=kubernetes; the Vault role bound to the cha SA
    tokenSecretRef:               # required when method=token
      name: ""                    # K8s Secret holding a Vault token
      key: "token"                # key within that Secret

# Alertmanager integration — Kubernetes-native event routing.
# When enabled, CHA posts the full active-issue state to Alertmanager each
# watcher cycle. Alertmanager handles: dedup, grouping, silencing, repeat
# intervals, and fan-out to all configured receivers (Slack, PagerDuty,
# Teams, email, webhook, …). This is the preferred model over direct Slack
# webhooks; the slack.alerts/critical fields become fallback-only.
#
# url: in-cluster service URL of the Alertmanager API.
# clusterName: stamped as the `cluster` label on every alert.
alertmanager:
  enabled: false
  url: ""                        # e.g. "http://alertmanager.pg.svc.cluster.local:9093"
  clusterName: "cluster"         # identifies this cluster in alert labels

# Cloud probe framework — observe AWS / GCP / Azure resources alongside
# K8s state. Each provider is independently toggleable. Cloud probes do
# NOT fire on K8s event triggers — they run on `cadence` (default 10m)
# to protect cloud-API rate limits.
#
# Master switch: `cloud.enabled=false` disables EVERYTHING below and
# pays zero overhead (no SDK init, no probe registration, no extra
# RBAC). Required for air-gapped deployments where cloud APIs are not
# reachable.
#
# Auth defaults to workload-identity (IRSA on EKS, GCP Workload Identity
# on GKE, AAD Workload Identity on AKS). The Helm chart auto-annotates
# the ServiceAccount with the role-arn / GSA / clientID you supply.
#
# See cluster-health-autopilot/docs/design/2026-05-cloud-probe-framework.md
# for the full design, M1 (AWS) shipped probe list, and M2 (GCP+Azure).
cloud:
  enabled: false
  cadence: 10m                     # min interval between cloud-probe runs
  rateLimitPerMin: 60              # per-provider; override per-provider below
  aws:
    enabled: false
    region: ""                     # required; e.g. "us-east-1"
    auth:
      mode: irsa                   # irsa | assumeRole | staticCredentials
      roleArn: ""                  # for IRSA: ARN of the IAM role; auto-injected as eks.amazonaws.com/role-arn SA annotation
      assumeRoleArn: ""            # for assumeRole: target role
      credentialsSecret: ""        # for staticCredentials: K8s Secret name (ESO-managed)
    # Per-probe toggles. Each probe is small and independent; turn off
    # any you don't want without losing the rest. M1 ships RDS only;
    # the other 9 land in follow-up commits on feat/cloud-probes.
    probes:
      rds: true
      ebs: false                   # M1 follow-up
      eks: false                   # M1 follow-up
      iam: false                   # M1 follow-up
      alb: false                   # M1 follow-up
      acm: false                   # M1 follow-up
      kms: false                   # M1 follow-up
      s3: false                    # M1 follow-up
      vpc: false                   # M1 follow-up
  gcp:
    enabled: false                 # M2 — not shipped yet
    project: ""
    auth:
      mode: workloadIdentity       # workloadIdentity | staticCredentials
      serviceAccount: ""           # for workloadIdentity: GSA email; auto-injected as iam.gke.io/gcp-service-account SA annotation
      credentialsSecret: ""        # for staticCredentials: K8s Secret name
  azure:
    enabled: false                 # M2 — not shipped yet
    subscriptionId: ""
    resourceGroup: ""              # optional scope; empty = subscription-wide
    auth:
      mode: workloadIdentity       # workloadIdentity | staticCredentials
      clientId: ""                 # for workloadIdentity: AAD app client ID; auto-injected as azure.workload.identity/client-id SA annotation
      credentialsSecret: ""        # for staticCredentials: K8s Secret name

# Ticketing — open issue-tracker tickets for diagnostics CHA cannot
# auto-remediate. Runs after each watcher cycle's DriftReport reconcile;
# the resulting ticket key is persisted onto DriftReport.status.ticket
# so subsequent cycles know not to re-open the same ticket.
#
# Sink failures NEVER abort the cycle — logged and skipped, same posture
# as Slack/Alertmanager.
#
# OSS ships the OpenProject sink (provider: openproject) talking to an
# in-cluster MCP server. Jira and ServiceNow live in CHA-com.
#
# Auth: when MCP traffic goes through Kong (provider URL on
# mcp.baisoln.com) you must supply auth.apiKey via ESO. For in-cluster
# traffic (mcp-openproject-server.mcp.svc), Kong is bypassed and
# auth.apiKey can stay empty.
ticketing:
  enabled: false
  provider: openproject                  # openproject | jira | servicenow
  cluster: "cluster"                     # identifies this cluster in ticket bodies; matches alertmanager.clusterName
  labels:                                # merged into every ticket
    - cha
    - auto-filed
  openproject:
    # MCP endpoint speaking Streamable-HTTP (single POST endpoint).
    # In-cluster default — bypasses Kong, no API key required.
    mcpURL: "http://mcp-openproject-server.mcp.svc:8006/mcp"
    # All ID fields below are numeric strings matching what the MCP
    # server's list_projects / list_types / list_priorities /
    # list_statuses tools return. Discover with:
    #   curl -fsSL -X POST $MCP_URL -H 'Content-Type: application/json' \
    #     -d '{"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"list_projects","arguments":{}}}'
    projectID: ""                        # e.g. "6" for the Demo project
    typeID: ""                           # e.g. "36" for Task — REQUIRED
    closedStatusID: ""                   # e.g. "82" for Closed status — needed for resolve-on-clear (M2)
    webURLPrefix: ""                     # e.g. "https://op.bionicaisolutions.com" — used to build operator-clickable URLs
    # Map CHA severities → OpenProject priority IDs. Empty values let
    # OpenProject use the project default priority for that severity.
    severityPriority:
      critical: ""                       # e.g. "75" for Immediate
      warning:  ""                       # e.g. "74" for High
      info:     ""                       # e.g. "73" for Normal
  # Optional API key when talking to the MCP server through Kong
  # (provider URL on mcp.baisoln.com). For in-cluster traffic leave
  # auth.enabled=false. When enabled, the secret is expected to be
  # synced by ExternalSecret from Vault.
  auth:
    enabled: false
    secretName: cha-ticketing-mcp        # K8s Secret with the API key
    secretKey: api-key                   # Key inside the Secret
  dryRun: false                          # Log intended ops without calling the MCP server

# Watcher — event-driven, long-running Deployment (Phase 1).
# Replaces polling latency (CronJob tick) with near-instant reaction to
# Kubernetes watch events. Debounces burst updates before re-running the
# full probe+analyzer stack.
#
# Slack dedup: only new/changed/resolved diagnostics produce a post.
# The seen-map is seeded from DriftReport CRs on startup so a pod restart
# does not re-flood Slack with all known issues.
#
# Set watcher.remedy.enabled=true to run auto-fixers after each cycle and
# report the post-fix cluster state.
watcher:
  enabled: false
  debounce: 10s                    # Debounce window after a Kubernetes event.
  resyncPeriod: 10m                # Periodic full re-diagnose regardless of events.
  slack:
    postOnResolved: true           # Post when a diagnostic disappears.
    repeatInterval: 4h             # Re-post still-active warning/info at this cadence (0=never).
    criticalRepeatInterval: ""     # Re-post still-active CRITICAL at this cadence (empty = fall back to repeatInterval).
                                   # Use to keep criticals loud (e.g. "4h") while letting warnings calm down (e.g. set repeatInterval=24h).
  remedy:
    enabled: false                 # Run auto-fixers after each cycle (live mutation).
    dryRun: false                  # Evaluate fixers without mutating cluster state.
  # Sprint 4.3 — Lease-based leader election.
  # When enabled (default), two watcher replicas race for a
  # coordination.k8s.io/v1.Lease object; only the lease-holder runs the
  # probe/fix/post cycle. If the leader pod dies, the other takes over
  # within ~30s. Required for any replicas > 1 deployment.
  #
  # Disable for single-pod dev or out-of-cluster invocations (cha
  # snapshot capture, cha diagnose). The chart's default replicas=1
  # works either way but with election ON it's also safe to scale up.
  leaderElection:
    enabled: true
    leaseName: cha-watcher
    leaseDuration: 30s
    renewDeadline: 20s
    retryPeriod: 5s
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi

# GitHub Actions self-hosted runner — Mode A of the WS-C publish pipeline.
# Deploys myoung34/github-runner inside the cluster so the nightly
# publish-runs workflow can call `cha diagnose --live` directly without
# needing an internet-reachable MinIO endpoint.
#
# Prerequisites:
#   1. A GitHub PAT (classic, repo scope) or fine-grained token (Actions:write)
#      stored in Vault at: secret/t6-apps/cha/config → github_pat
#   2. ESO ClusterSecretStore "vault-backend" already configured.
#   3. Set runner.repoUrl to the full repo URL.
#
# Once deployed, flip publish-runs.yml: publish-self-hosted.if: true
#                                        publish-minio.if: false
runner:
  enabled: false
  repoUrl: "https://github.com/Bionic-AI-Solutions/cluster-health-autopilot"
  labels: "self-hosted,cluster"        # must match runs-on in publish-runs.yml
  name: "cha-cluster-runner"
  # Runner image — ubuntu-jammy = Ubuntu 22.04; ubuntu-noble = 24.04
  image: "myoung34/github-runner:ubuntu-jammy"
  # Secret that holds ACCESS_TOKEN for runner registration.
  # Created by the ExternalSecret below — do not create manually.
  tokenSecretName: "cha-runner-token"
  tokenSecretKey: "ACCESS_TOKEN"
  resources:
    limits:
      cpu: "2"
      memory: 4Gi
    requests:
      cpu: 250m
      memory: 512Mi
  # Runner pod runs as root (required by myoung34/github-runner).
  # It does NOT use the shared podSecurityContext.
  nodeSelector: {}
  tolerations: []

# RBAC. Keep enabled — the CronJob will fail without these.
rbac:
  create: true
  # Read-only role: probes + analyzers.
  reader:
    name: ""                      # default: <release>-reader
  # Write role: fixers. Granted only when .Values.remediation.enabled is true.
  remediator:
    name: ""                      # default: <release>-remediator

serviceAccount:
  create: true
  name: ""                        # default: <release>-sa
  annotations: {}

# Resource requests / limits (per CronJob pod).
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Pod-level scheduling controls.
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

# Pod / container security context.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# AI tier (commercial / CHA-com only) — recommendation-only AI for narration,
# fix proposals, multi-step plans, and Vault recovery runbooks. Every tier
# gates mutation behind human one-click approval. See docs/AI_TIERS.md.
#
# OSS deployments leave ai.enabled=false; this entire block is then inert.
ai:
  enabled: false
  tier: t0                # t0 | t1 | t2 | t3
  endpoint: ""            # REQUIRED if enabled; e.g. "https://gpu-ai.svc:8000/v1"
  allowSaas: false        # set true to allow api.openai.com / api.anthropic.com endpoints
  apiKey:
    secretName: ""        # K8s secret holding the LLM API key (if any)
    secretKey: "API_KEY"
  rateLimit:
    actionsPerHour: 5     # AI-proposed actions/hour budget
    tokensPerHour: 1000000
  circuitBreaker:
    consecutiveFailures: 3
  audit:
    destination: events   # events | loki | otlp
    lokiURL: ""
    otlpEndpoint: ""

# Approval-server sidecar — holds the JWT signing key, terminates click-to-fix
# URLs. Automatically required (and chart-level validation should ensure) when
# ai.tier ∈ {t1, t2, t3}. For ai.tier=t0 (narration only) approval is unused.
approval:
  enabled: false
  replicas: 1
  image:
    repository: docker4zerocool/cha-com
    tag: ""               # default = .Chart.AppVersion
    pullPolicy: IfNotPresent
  signingKey:
    secretName: cha-approval-signing-key
  ingress:
    enabled: false
    host: ""               # REQUIRED if approval.ingress.enabled; e.g. cha-approve.example.com
    ingressClassName: ""
    annotations: {}
    tls:
      enabled: true
      secretName: ""       # default: <release>-approval-server-tls
  resources:               # defaults to top-level resources if unset
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 20m
      memory: 32Mi
  nodeSelector: {}

# Gatekeeper ConstraintTemplate — third-layer admission policy that rejects
# mutations against protected namespaces even if a signed approval somehow
# requested one. Requires OPA Gatekeeper to be installed in the cluster.
gatekeeper:
  install: false           # set true if Gatekeeper is installed in the cluster
  constraints:
    protectedNamespaces:
      - kube-system
      - kube-public
      - kube-node-lease
      - rook-ceph
      - vault
      - external-secrets
      - cnpg-system

# Drift-class analyzers added in v1.7 (Workstream B from the AI SRE
# positioning plan). Default to ON so existing installs get the new
# signal automatically; flip to false to silence on clusters that
# don't have the relevant CRDs installed.
analyzers:
  gitopsDrift:
    # GitOps drift — Argo CD Application + Flux Kustomization +
    # Flux HelmRelease. Surfaces controllers stuck OutOfSync,
    # Degraded, NotReady, BuildFailed, UpgradeFailed, etc. Default
    # 10-minute grace period (controllers are routinely
    # reconciling). Set to false on clusters without Argo/Flux to
    # skip the "no such CRD" list calls.
    enabled: true

# Optional fixers — off by default. Each entry adds RBAC verbs and exposes
# an env var the binary reads to enable the matching Fixer registration.
fixers:
  tlsSecretMismatch:
    # Patches Ingress.spec.tls[].secretName when CHA detects a stale Secret
    # plus a healthy cert-manager Certificate in the same namespace targeting
    # a different Secret for the same host. GitOps-managed Ingresses
    # (ArgoCD / Flux / Helm release labels) are SKIPPED automatically — the
    # patch would just be reverted on the next reconcile.
    enabled: false
