{{- if and .Values.ticketing.enabled .Values.ticketing.auth.enabled }}
# Pulls the MCP API key from Vault and materializes it as a K8s Secret
# the watcher Deployment mounts as TICKETING_MCP_API_KEY.
#
# Vault path: secret/t6-apps/srenix/config → ticketing_mcp_api_key
#
# Only created when both ticketing AND ticketing.auth are enabled —
# in-cluster MCP traffic bypasses Kong and needs no key, so the default
# is to skip ESO entirely.
#
# Requires ESO ClusterSecretStore "vault-backend" to be configured.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "srenix.fullname" . }}-ticketing-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: ticketing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.ticketing.auth.secretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.ticketing.auth.secretKey }}
      remoteRef:
        key: t6-apps/srenix/config
        property: ticketing_mcp_api_key
{{- end }}
