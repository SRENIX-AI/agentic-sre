{{- if ((.Values.approval).enabled) }}
# approval-server-keygen-job.yaml
#
# Generates the Ed25519 signing keypair the approval-server uses to
# sign JWT approval tokens. Runs as a pre-install / pre-upgrade Helm
# hook so the Secret exists before the approval-server Deployment is
# scheduled. Idempotent — if the Secret already exists with valid keys,
# this job is a no-op.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "srenix.fullname" . }}-approval-keygen
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "srenix.fullname" . }}-approval-keygen
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "srenix.fullname" . }}-approval-keygen
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "srenix.fullname" . }}-approval-keygen
subjects:
  - kind: ServiceAccount
    name: {{ include "srenix.fullname" . }}-approval-keygen
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "srenix.fullname" . }}-approval-keygen
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "srenix.fullname" . }}-approval-keygen
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: keygen
          image: {{ .Values.approval.image.repository }}:{{ .Values.approval.image.tag | default (printf "v%s" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.approval.image.pullPolicy | default "Always" }}
          args:
            - gen-signing-key
            - --namespace={{ .Release.Namespace }}
            - --secret-name={{ .Values.approval.signingKey.secretName | default "srenix-approval-signing-key" }}
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 16Mi
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
{{- end }}
