{{- if .Values.watcher.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "srenix.fullname" . }}-watcher
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: watcher
{{- /* P1.9(a) — replicas honor watcher.replicas (default 1). Raising
      above 1 is ONLY safe with leader election ON (SRENIX_LEADER_ELECTION
      path): otherwise every replica runs the probe/fix/post cycle and
      they race on DriftReports + double-post Slack. Fail the render
      rather than ship a silently-racing multi-pod watcher. */}}
{{- $watcherReplicas := .Values.watcher.replicas | default 1 }}
{{- if and (gt (int $watcherReplicas) 1) (not .Values.watcher.leaderElection.enabled) }}
{{- fail "watcher.replicas > 1 requires watcher.leaderElection.enabled=true (otherwise replicas race on DriftReports and double-post Slack). Set watcher.leaderElection.enabled=true or keep watcher.replicas=1." }}
{{- end }}
spec:
  replicas: {{ $watcherReplicas }}
  selector:
    matchLabels:
      {{- include "srenix.selectorLabels" . | nindent 6 }}
      srenix.ai/role: watcher
  # Recreate avoids two watcher pods both writing DriftReports simultaneously.
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "srenix.selectorLabels" . | nindent 8 }}
        srenix.ai/role: watcher
    spec:
      serviceAccountName: {{ include "srenix.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: srenix
          image: {{ include "srenix.image" . }}
          imagePullPolicy: {{ include "srenix.pullPolicy" . }}
          args:
            - watch
            - --live
            - --debounce={{ .Values.watcher.debounce | default "10s" }}
            - --resync-period={{ .Values.watcher.resyncPeriod | default "10m" }}
            - --write-driftreports={{ .Values.driftReport.enabled }}
            {{- if and .Values.slack.alerts.enabled .Values.slack.alerts.secretName }}
            - --slack-alerts=$(SLACK_ALERTS_URL)
            {{- end }}
            {{- if and .Values.slack.critical.enabled .Values.slack.critical.secretName }}
            - --slack-critical=$(SLACK_CRITICAL_URL)
            {{- end }}
            {{- if or (and .Values.slack.alerts.enabled .Values.slack.alerts.secretName) (and .Values.slack.critical.enabled .Values.slack.critical.secretName) }}
            {{- /* values.yaml provides defaults (postOnResolved: true,
                  repeatInterval: 4h). We render the value directly because
                  sprig `default` treats bool false as empty and would
                  silently flip an explicit `false` back to `true`. */}}
            - --slack-post-on-resolved={{ .Values.watcher.slack.postOnResolved }}
            - --slack-repeat-interval={{ .Values.watcher.slack.repeatInterval }}
            {{- /* criticalRepeatInterval: empty string = "fall back to
                  repeatInterval" — render only when explicitly set. */}}
            {{- with .Values.watcher.slack.criticalRepeatInterval }}
            - --slack-critical-repeat-interval={{ . }}
            {{- end }}
            {{- /* approval.dwellDuration: 0/empty = disable (attach URLs immediately,
                  legacy behaviour). Render only when explicitly set so existing
                  installs are byte-identical. */}}
            {{- with ((.Values.watcher.approval).dwellDuration) }}
            - --approval-dwell={{ . }}
            {{- end }}
            {{- end }}
            {{- if and .Values.alertmanager.enabled .Values.alertmanager.url }}
            - --alertmanager-url={{ .Values.alertmanager.url }}
            - --cluster-name={{ .Values.alertmanager.clusterName | default "cluster" }}
            {{- end }}
            {{- /* v1.23.0+ M5 — Prometheus class-C trigger. interval +
                  filter only render when URL is set so the legacy
                  no-trigger install renders byte-identical args. */}}
            {{- if ((.Values.watcher.triggers).prom).url }}
            - --prom-trigger-url={{ .Values.watcher.triggers.prom.url }}
            {{- with .Values.watcher.triggers.prom.interval }}
            - --prom-trigger-interval={{ . }}
            {{- end }}
            {{- range .Values.watcher.triggers.prom.alertNameFilter }}
            - --prom-trigger-alert-filter={{ . }}
            {{- end }}
            {{- end }}
            {{- /* v1.23.0+ M6 — webhook class-E receiver. sources only
                  render when listen is set; an unauthenticated source
                  registration without the receiver would be confusing. */}}
            {{- if ((.Values.watcher.triggers).webhook).listen }}
            - --webhook-listen={{ .Values.watcher.triggers.webhook.listen }}
            {{- range .Values.watcher.triggers.webhook.sources }}
            - --webhook-source={{ . }}
            {{- end }}
            {{- end }}
            {{- /* P1.9(a) — always-on health server. Rendered
                  unconditionally so the liveness/readiness probes below
                  always have a target. */}}
            - --health-listen={{ .Values.watcher.healthListen | default ":8081" }}
            {{- if ((.Values.watcher.remedy).enabled) }}
            - --remedy
            {{- if ((.Values.watcher.remedy).dryRun) }}
            - --dry-run
            {{- end }}
            {{- end }}
            {{- if .Values.ticketing.enabled }}
            {{- /* v1.20.0: chart values flattened to mirror CRD's spec.ticketing.* shape so YAML moves freely between Helm and CR. Legacy nested form (ticketing.openproject.*) is a fallback when matching flat field is empty. Nested form removed in next major. */}}
            {{- $t := .Values.ticketing }}
            {{- $providerKey := default "openproject" $t.provider }}
            {{- $p := dict }}
            {{- if hasKey $t $providerKey }}
              {{- $p = index $t $providerKey }}
            {{- end }}
            - --ticketing-provider={{ .Values.ticketing.provider }}
            {{- $mcpURL := $t.mcpURL | default (get $p "mcpURL") }}
            {{- with $mcpURL }}
            - --ticketing-mcp-url={{ . }}
            {{- end }}
            {{- $project := $t.project | default (get $p "projectID") | default (get $p "project") }}
            {{- with $project }}
            - --ticketing-project={{ . }}
            {{- end }}
            {{- $typeID := $t.typeID | default (get $p "typeID") }}
            {{- with $typeID }}
            - --ticketing-type-id={{ . }}
            {{- end }}
            {{- $closedStatusID := $t.closedStatusID | default (get $p "closedStatusID") }}
            {{- with $closedStatusID }}
            - --ticketing-closed-status-id={{ . }}
            {{- end }}
            {{- $sp := $t.severityPriority | default (get $p "severityPriority") | default (dict) }}
            {{- with $sp.critical }}
            - --ticketing-priority-critical={{ . }}
            {{- end }}
            {{- with $sp.warning }}
            - --ticketing-priority-warning={{ . }}
            {{- end }}
            {{- with $sp.info }}
            - --ticketing-priority-info={{ . }}
            {{- end }}
            {{- $webURLPrefix := $t.webURLPrefix | default (get $p "webURLPrefix") }}
            {{- with $webURLPrefix }}
            - --ticketing-web-url-prefix={{ . }}
            {{- end }}
            {{- range .Values.ticketing.labels }}
            - --ticketing-labels={{ . }}
            {{- end }}
            {{- if .Values.ticketing.dryRun }}
            - --ticketing-dry-run
            {{- end }}
            {{- if hasKey .Values.ticketing "resolveOnClear" }}
            - --ticketing-resolve-on-clear={{ .Values.ticketing.resolveOnClear }}
            {{- end }}
            {{- with .Values.ticketing.commentInterval }}
            - --ticketing-comment-interval={{ . }}
            {{- end }}
            {{- end }}
            {{- if .Values.cloud.enabled }}
            - --cloud-cadence={{ .Values.cloud.cadence | default "10m" }}
            {{- if .Values.cloud.aws.enabled }}
            - --cloud-aws-enabled
            - --cloud-aws-region={{ required "cloud.aws.region required when cloud.aws.enabled" .Values.cloud.aws.region }}
            {{- end }}
            {{- if .Values.cloud.gcp.enabled }}
            - --cloud-gcp-enabled
            - --cloud-gcp-project={{ required "cloud.gcp.project required when cloud.gcp.enabled" .Values.cloud.gcp.project }}
            {{- end }}
            {{- if .Values.cloud.azure.enabled }}
            - --cloud-azure-enabled
            - --cloud-azure-subscription-id={{ required "cloud.azure.subscriptionId required when cloud.azure.enabled" .Values.cloud.azure.subscriptionId }}
            {{- end }}
            {{- end }}
          env:
            # Downward-API for leader election (Sprint 4.3) — the
            # LeaderConfig reads these to construct the lease holder
            # identity and namespace.
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- if not .Values.watcher.leaderElection.enabled }}
            - name: SRENIX_LEADER_ELECTION
              value: "off"
            {{- end }}
            {{- include "srenix.slackAlertsEnv" . | nindent 12 }}
            {{- include "srenix.slackCriticalEnv" . | nindent 12 }}
            {{- include "srenix.vaultEnv" . | nindent 12 }}
            {{- include "srenix.optionalFixerEnv" . | nindent 12 }}
            {{- include "srenix.protectedNamespacesEnv" . | nindent 12 }}
            {{- include "srenix.analyzerToggleEnv" . | nindent 12 }}
            {{- include "srenix.probeToggleEnv" . | nindent 12 }}
            {{- include "srenix.cloudProbeToggleEnv" . | nindent 12 }}
            {{- include "srenix.investigatorEnv" . | nindent 12 }}
            {{- include "srenix.externalDNSEnv" . | nindent 12 }}
            {{- include "srenix.extraEnv" . | nindent 12 }}
            {{- if and .Values.ticketing.enabled .Values.ticketing.auth.enabled }}
            - name: TICKETING_MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.ticketing.auth.secretName }}
                  key: {{ .Values.ticketing.auth.secretKey }}
            {{- end }}
            {{- /* v1.23.0+ M6 — project every env-var-bearing key from
                  the webhook secret into the container so each
                  --webhook-source <name>=<env-var> entry resolves at
                  startup. Empty secretName = no projection (debug
                  installs with no-secret sources). Avoid nested `with`
                  to keep $.Values reachable inside the range. */}}
            {{- if and (((.Values.watcher.triggers).webhook).secretName) (((.Values.watcher.triggers).webhook).sources) }}
            {{- $secretName := .Values.watcher.triggers.webhook.secretName }}
            {{- range .Values.watcher.triggers.webhook.sources }}
            {{- $envName := index (regexSplit "=" . -1) 1 }}
            - name: {{ $envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $envName }}
            {{- end }}
            {{- end }}
          {{- /* P1.9(a) — derive the health port number from the
                listen address (":8081" -> 8081) for the named port +
                probes. The always-on health server makes this port
                unconditional. */}}
          {{- $healthAddr := .Values.watcher.healthListen | default ":8081" }}
          {{- $healthPort := splitList ":" $healthAddr | last | int }}
          ports:
            - name: health
              containerPort: {{ $healthPort }}
              protocol: TCP
            {{- /* v1.23.0+ M6 — declare the webhook port when the receiver is on. */}}
            {{- if ((.Values.watcher.triggers).webhook).listen }}
            - name: webhook
              containerPort: {{ ((.Values.watcher.triggers).webhook).service.port | default 8090 }}
              protocol: TCP
            {{- end }}
          {{- /* P1.9(a) — liveness/readiness against the always-on
                /healthz. Mirrors the approval-server / operator probe
                pattern.

                O11 (1.26.1): /healthz answers 200 in STANDBY too — the
                binary binds the health listener before leader election.
                Do NOT point readiness at a leadership-gated endpoint:
                the watcher serves no Service traffic that readiness
                must gate, and a standby-not-Ready pod deadlocks
                rolling upgrades where the new pod must go Ready while
                the old leader still holds the lease (production 1.26.0
                incident). */}}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            {{- toYaml .Values.watcher.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
{{- end }}
