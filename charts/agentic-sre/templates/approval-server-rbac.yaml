{{- if ((.Values.approval).enabled) }}
# approval-server-rbac.yaml
#
# The approval-server SA needs:
#   1. CLUSTER-WIDE: same Mutator verbs as the watcher's remediator role
#      (pods/delete, jobs/delete, deployments/patch, certificaterequests/delete,
#      orders/delete). It applies AI-approved fixes once an SRE clicks.
#   2. NAMESPACE-LOCAL: read access to the approval signing-key Secret.
#      The watcher SA explicitly does NOT have this access.
#   3. NAMESPACE-LOCAL: create events for audit-trail emission.
#
# The watcher's existing remediator ClusterRole is REUSED for the
# Mutator verbs — no new RBAC verbs are introduced by AI tiers. The
# approval-server is bound to the same ClusterRole via a separate
# ClusterRoleBinding.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "srenix.fullname" . }}-approval-server-remediator
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ default (printf "%s-remediator" (include "srenix.fullname" .)) .Values.rbac.remediator.name }}
subjects:
  - kind: ServiceAccount
    name: {{ include "srenix.fullname" . }}-approval-server
    namespace: {{ .Release.Namespace }}
---
# Read-only on the signing key Secret (namespace-local).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "srenix.fullname" . }}-approval-signing-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.approval.signingKey.secretName | default "srenix-approval-signing-key" }}
    verbs: ["get", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "srenix.fullname" . }}-approval-signing-reader
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "srenix.fullname" . }}-approval-signing-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "srenix.fullname" . }}-approval-server
    namespace: {{ .Release.Namespace }}
---
# Audit Events emission.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "srenix.fullname" . }}-approval-events
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "srenix.fullname" . }}-approval-events
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "srenix.fullname" . }}-approval-events
subjects:
  - kind: ServiceAccount
    name: {{ include "srenix.fullname" . }}-approval-server
    namespace: {{ .Release.Namespace }}
---
# One-click Silence: the approval-server's /silence handler consumes a
# signed silence token and CREATES a Silence CR (subject-scoped 24h or
# class-scoped 90d). Namespace-local — silences live in the Srenix release
# namespace. create cannot be resourceName-scoped; get+list let the
# handler dedup / report. The watcher SA has READ-only on silences (it
# honors them); only the approval-server may create from a clicked link.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "srenix.fullname" . }}-approval-silence-writer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
rules:
  - apiGroups: ["srenix.ai"]
    resources: ["silences"]
    verbs: ["create", "get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "srenix.fullname" . }}-approval-silence-writer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "srenix.fullname" . }}-approval-silence-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "srenix.fullname" . }}-approval-server
    namespace: {{ .Release.Namespace }}
{{- if eq (.Values.approval.store).backend "configmap" }}
---
# G10 approval-HA: when the operator selects the shared ConfigMap store
# backend, the approval-server SA needs RW on the replay + runbook
# ConfigMaps. Gated on store.backend so the inmemory deploy stays
# minimum-privilege (no extra ConfigMap access).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "srenix.fullname" . }}-approval-stores
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames:
      - {{ .Values.approval.store.replayConfigMap | default "srenix-approval-replay" }}
      - {{ .Values.approval.store.runbookConfigMap | default "srenix-approval-runbooks" }}
    verbs: ["get", "update"]
  # Initial create-if-not-exists: scoped without resourceNames since
  # create cannot be restricted by name.
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "srenix.fullname" . }}-approval-stores
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "srenix.fullname" . }}-approval-stores
subjects:
  - kind: ServiceAccount
    name: {{ include "srenix.fullname" . }}-approval-server
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
