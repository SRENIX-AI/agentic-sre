{{- if (.Values.silence).installCRD }}
# Silence CRD — operator-controlled noise suppression.
#
# A Silence mutes diagnostics matching its `spec.matcher` (source +
# subject + severity, with empty fields acting as wildcards) until
# `spec.until`. The watcher fetches active Silences once per cycle and
# drops matched findings before downstream emission (DriftReport /
# Slack / Alertmanager / ticketing), so a known-benign-but-unfixable
# finding doesn't re-page every probe interval.
#
# Lifecycle: operators create + delete on their own. Past `spec.until`
# the Silence is a no-op (status.active flips to false) but is NOT
# auto-deleted — leaves an audit trail of what was muted, when, and
# why. Operators can extend by editing `spec.until`.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: silences.srenix.ai
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
spec:
  group: srenix.ai
  scope: Namespaced
  names:
    kind: Silence
    plural: silences
    singular: silence
    shortNames:
      - sil
    categories:
      - srenix
      - cluster-health
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              required:
                - matcher
                - until
              properties:
                matcher:
                  type: object
                  # At least one of source/subject/severity must be set.
                  # An entirely-empty matcher would mute every diagnostic
                  # cluster-wide — almost certainly a typo. Validated
                  # both here (admission) and again by the filter
                  # (defense in depth).
                  anyOf:
                    - required: [source]
                    - required: [subject]
                    - required: [severity]
                  properties:
                    source:
                      type: string
                      minLength: 1
                    subject:
                      type: string
                      minLength: 1
                    severity:
                      type: string
                      enum: ["warning", "critical"]
                    messagePattern:
                      # v1.21.0 (Phase 2.B.9) — class-scoped silence
                      # via substring match on Diagnostic.Message.
                      type: string
                      minLength: 1
                      maxLength: 256
                until:
                  type: string
                  format: date-time
                reason:
                  type: string
                  maxLength: 1024
                createdBy:
                  type: string
                  maxLength: 256
            status:
              type: object
              properties:
                active:
                  type: boolean
                matchCount:
                  type: integer
                  minimum: 0
                lastMatchAt:
                  type: string
                  format: date-time
      additionalPrinterColumns:
        - name: Source
          type: string
          jsonPath: .spec.matcher.source
        - name: Subject
          type: string
          jsonPath: .spec.matcher.subject
        - name: Until
          # type=string renders the raw RFC3339 timestamp. NOT type=date:
          # kubectl renders date columns as age-since (negative/<invalid>
          # for the future expiries every active Silence has).
          type: string
          jsonPath: .spec.until
        - name: Active
          type: boolean
          jsonPath: .status.active
        - name: Matched
          type: integer
          jsonPath: .status.matchCount
{{- end }}
