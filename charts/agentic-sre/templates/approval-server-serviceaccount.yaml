{{- if ((.Values.approval).enabled) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "srenix.fullname" . }}-approval-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: approval-server
  annotations:
    srenix.ai/purpose: >-
      Approval-server sidecar ServiceAccount. Holds the JWT signing key
      via a Secret mount that the watcher SA cannot read.
{{- end }}
