{{- if ((.Values.dashboard).enabled) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "srenix.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: dashboard
  annotations:
    srenix.ai/purpose: >-
      Read-only dashboard ServiceAccount (P6.6). Carries ONLY get/list/watch
      on driftreports — no signing key, no mutate verbs, no Secret access.
{{- end }}
