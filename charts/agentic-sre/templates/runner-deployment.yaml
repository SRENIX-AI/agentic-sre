{{- if .Values.runner.enabled }}
# Self-hosted GitHub Actions runner — Mode A of the WS-C publish pipeline.
# Runs inside the cluster so `srenix diagnose --live` works without a public
# MinIO endpoint. Uses the srenix service account for in-cluster API access.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "srenix.fullname" . }}-runner
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "srenix.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: runner
  template:
    metadata:
      labels:
        {{- include "srenix.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: runner
    spec:
      # Use the Srenix service account so --live mode has the correct RBAC.
      serviceAccountName: {{ include "srenix.serviceAccountName" . }}
      # myoung34/github-runner requires root to install tools and register.
      securityContext: {}
      containers:
        - name: runner
          image: {{ .Values.runner.image | default "myoung34/github-runner:ubuntu-jammy" }}
          imagePullPolicy: IfNotPresent
          env:
            - name: REPO_URL
              value: {{ .Values.runner.repoUrl | quote }}
            - name: RUNNER_LABELS
              value: {{ .Values.runner.labels | quote }}
            - name: RUNNER_NAME
              value: {{ .Values.runner.name | quote }}
            - name: DISABLE_AUTO_UPDATE
              value: "true"
            - name: RUNNER_SCOPE
              value: "repo"
            - name: EPHEMERAL
              value: "false"
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.runner.tokenSecretName }}
                  key: {{ .Values.runner.tokenSecretKey }}
          resources:
            {{- toYaml .Values.runner.resources | nindent 12 }}
          volumeMounts:
            - name: work
              mountPath: /home/runner/_work
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: work
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.runner.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runner.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
