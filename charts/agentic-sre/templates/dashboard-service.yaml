{{- if ((.Values.dashboard).enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "srenix.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: dashboard
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8444
      targetPort: http
      protocol: TCP
  selector:
    {{- include "srenix.selectorLabels" . | nindent 4 }}
    srenix.ai/role: dashboard
{{- end }}
