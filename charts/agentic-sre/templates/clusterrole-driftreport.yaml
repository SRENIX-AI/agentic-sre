{{- if .Values.driftReport.enabled }}
# DriftReport-writer ClusterRole.
#
# Separate from the remediator role on purpose: DriftReport CRs are the
# *output* of every diagnose run, not a remediation. Keeping the verbs in
# their own ClusterRole means a diagnose-only deployment (the recommended
# starting posture) still publishes CRs, while the security audit story
# stays clean — a reviewer sees three roles with a single responsibility
# each rather than one role with mixed verbs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "srenix.fullname" . }}-driftreport-writer
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
rules:
  - apiGroups: ["srenix.ai"]
    resources: ["driftreports"]
    verbs: ["create", "update", "patch", "delete"]
  - apiGroups: ["srenix.ai"]
    resources: ["driftreports/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "srenix.fullname" . }}-driftreport-writer
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "srenix.fullname" . }}-driftreport-writer
subjects:
  - kind: ServiceAccount
    name: {{ include "srenix.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
