{{- if .Values.runner.enabled }}
# Pulls the GitHub PAT from Vault and surfaces it as the runner token secret.
# Vault path: secret/t6-apps/srenix/config → github_pat
# Requires ESO ClusterSecretStore "vault-backend" to be configured.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "srenix.fullname" . }}-runner-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: {{ .Values.runner.tokenSecretName }}
    creationPolicy: Owner
  data:
    - secretKey: {{ .Values.runner.tokenSecretKey }}
      remoteRef:
        key: t6-apps/srenix/config
        property: github_pat
{{- end }}
