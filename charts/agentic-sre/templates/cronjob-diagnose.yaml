{{- if .Values.diagnose.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "srenix.fullname" . }}-diagnose
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: diagnose
spec:
  schedule: {{ .Values.diagnose.schedule | quote }}
  concurrencyPolicy: {{ .Values.diagnose.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.diagnose.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.diagnose.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.diagnose.backoffLimit }}
      activeDeadlineSeconds: {{ .Values.diagnose.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            {{- include "srenix.selectorLabels" . | nindent 12 }}
            srenix.ai/role: diagnose
        spec:
          serviceAccountName: {{ include "srenix.serviceAccountName" . }}
          restartPolicy: OnFailure
          {{- with .Values.image.pullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.priorityClassName }}
          priorityClassName: {{ . }}
          {{- end }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: srenix
              image: {{ include "srenix.image" . }}
              imagePullPolicy: {{ include "srenix.pullPolicy" . }}
              args:
                - diagnose
                - --live
                - --format={{ .Values.diagnose.format }}
                {{- if and .Values.slack.healthinfo.enabled .Values.slack.healthinfo.secretName }}
                - --slack-healthinfo=$(SLACK_HEALTHINFO_URL)
                {{- end }}
              env:
                {{- include "srenix.slackHealthinfoEnv" . | nindent 16 }}
                {{- include "srenix.vaultEnv" . | nindent 16 }}
                {{- include "srenix.protectedNamespacesEnv" . | nindent 16 }}
                {{- include "srenix.analyzerToggleEnv" . | nindent 16 }}
                {{- include "srenix.probeToggleEnv" . | nindent 16 }}
                {{- include "srenix.investigatorEnv" . | nindent 16 }}
                {{- include "srenix.externalDNSEnv" . | nindent 16 }}
                {{- include "srenix.extraEnv" . | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
{{- end }}
