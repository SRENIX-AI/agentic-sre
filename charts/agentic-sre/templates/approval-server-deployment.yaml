{{- if ((.Values.approval).enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "srenix.fullname" . }}-approval-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: approval-server
spec:
  replicas: {{ .Values.approval.replicas | default 1 }}
  strategy:
    # Recreate avoids two approval-servers racing on the in-memory replay
    # store. With store.backend=configmap (G10) the replay + runbook state
    # is shared across replicas via Kubernetes, so RollingUpdate is safe
    # and replicas > 1 makes sense.
    {{- if eq (.Values.approval.store).backend "configmap" }}
    type: RollingUpdate
    {{- else }}
    type: Recreate
    {{- end }}
  selector:
    matchLabels:
      {{- include "srenix.selectorLabels" . | nindent 6 }}
      srenix.ai/role: approval-server
  template:
    metadata:
      labels:
        {{- include "srenix.selectorLabels" . | nindent 8 }}
        srenix.ai/role: approval-server
    spec:
      serviceAccountName: {{ include "srenix.fullname" . }}-approval-server
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.approval.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: approval-server
          image: {{ .Values.approval.image.repository }}:{{ .Values.approval.image.tag | default (printf "v%s" .Chart.AppVersion) }}
          imagePullPolicy: {{ .Values.approval.image.pullPolicy | default "Always" }}
          args:
            - approval-server
            - --listen=:8443
            - --signing-key-path=/etc/srenix/keys/signing.key
            - --audit-namespace={{ .Release.Namespace }}
            {{- if (.Values.approval.store).backend }}
            - --store-backend={{ .Values.approval.store.backend }}
            {{- with (.Values.approval.store).namespace }}
            - --store-namespace={{ . }}
            {{- end }}
            - --store-replay-configmap={{ .Values.approval.store.replayConfigMap | default "srenix-approval-replay" }}
            - --store-runbook-configmap={{ .Values.approval.store.runbookConfigMap | default "srenix-approval-runbooks" }}
            {{- end }}
            {{- if (.Values.ai.memory).enabled }}
            - --memory-store-url={{ (.Values.ai.memory).storeUrl | default (printf "http://%s-rag.%s.svc:6333" (include "srenix.fullname" .) .Release.Namespace) }}
            {{- with (.Values.ai.memory.embeddings).endpoint }}
            - --memory-embeddings-endpoint={{ . }}
            {{- end }}
            - --memory-embeddings-model={{ required "ai.memory.embeddings.model is required when ai.memory.enabled=true" (.Values.ai.memory.embeddings).model }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          env:
            - name: SRENIX_SIGNING_KEY_PATH
              value: /etc/srenix/keys/signing.key
          volumeMounts:
            - name: signing-key
              mountPath: /etc/srenix/keys
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          resources:
            {{- toYaml (.Values.approval.resources | default .Values.resources) | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: signing-key
          secret:
            secretName: {{ .Values.approval.signingKey.secretName | default "srenix-approval-signing-key" }}
            items:
              - key: signing.key
                path: signing.key
                mode: 0400
              - key: signing.pub
                path: signing.pub
                mode: 0444
            optional: false
{{- end }}
