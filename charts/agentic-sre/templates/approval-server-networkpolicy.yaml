{{- if and ((.Values.approval).enabled) (((.Values.approval).networkPolicy).enabled) }}
{{- if not ((.Values.approval).networkPolicy).gatewayNamespaceSelector }}
{{- fail "approval.networkPolicy.gatewayNamespaceSelector is REQUIRED when approval.networkPolicy.enabled=true. A NetworkPolicy is fail-closed: an empty selector would block ALL ingress to the approval-server (breaking approve/deny clicks) or match every namespace (defeating the control). Set it to the gateway/oauth2-proxy namespace's labels, e.g. {kubernetes.io/metadata.name: <gateway-namespace>}." }}
{{- end }}
# approval-server NetworkPolicy (P2.6b) — restricts ingress to the
# approval-server pods to ONLY the gateway/oauth2-proxy namespace.
#
# Why: the approval-server trusts the X-Forwarded-User header (injected
# by oauth2-proxy at the OIDC ingress after login) for audit
# attribution. A pod that reaches the ClusterIP directly bypasses the
# ingress and can forge an arbitrary X-Forwarded-User. The approve/deny
# click still requires a valid one-time signed token, so this is
# defense-in-depth for attribution honesty — but it closes a real
# bypass. With this policy only pods in the gateway namespace can reach
# port 8443, so the only X-Forwarded-User the server ever sees is the
# one oauth2-proxy set.
#
# REQUIRES the cluster CNI to enforce NetworkPolicy AND the gateway
# namespace to carry the labels named in gatewayNamespaceSelector.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "srenix.fullname" . }}-approval-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: approval-server
spec:
  podSelector:
    matchLabels:
      {{- include "srenix.selectorLabels" . | nindent 6 }}
      srenix.ai/role: approval-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.approval.networkPolicy.gatewayNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8443
{{- end }}
