{{- if and ((.Values.dashboard).enabled) (((.Values.dashboard).ingress).enabled) }}
# dashboard Ingress (P6.6) — public-facing route, meant to sit behind
# oauth2-proxy (which authenticates the operator and injects the
# X-Forwarded-User header the dashboard reads purely for display). A
# single Prefix path "/" fronts the whole read-only UI; the dashboard's
# /healthz + /readyz live under it so the upstream LB probe works too.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "srenix.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: dashboard
  {{- with .Values.dashboard.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.dashboard.ingress.ingressClassName }}
  ingressClassName: {{ .Values.dashboard.ingress.ingressClassName }}
  {{- end }}
  {{- if .Values.dashboard.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ required ".Values.dashboard.ingress.host is required when dashboard.ingress.enabled" .Values.dashboard.ingress.host }}
      secretName: {{ .Values.dashboard.ingress.tls.secretName | default (printf "%s-dashboard-tls" (include "srenix.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ required ".Values.dashboard.ingress.host is required" .Values.dashboard.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "srenix.fullname" . }}-dashboard
                port:
                  name: http
{{- end }}
