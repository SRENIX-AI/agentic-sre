{{- if (.Values.ai).enabled }}
# AI-companion Deployment (commercial Srenix Enterprise tier).
#
# This runs `srenix-enterprise watch` — the AI-layered COUNTERPART to the OSS
# watcher, NOT a replacement. The OSS watcher Deployment and the
# diagnose / remediate CronJobs keep running the OSS image and own the
# event-driven probe → fix → Slack / ticketing / DriftReport pipeline.
# This companion polls the SAME merged probe+analyzer catalog on an
# interval and fires the AI tiers (t0 narration → t3 Vault runbooks)
# against NEW diagnostics only, emitting recommendations (and, at t1+,
# click-to-fix URLs signed for the approval-server).
#
# Enabling is purely additive: set ai.enabled=true. No OSS workload is
# swapped or disturbed. See docs/DEPLOYMENT.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "srenix.fullname" . }}-aiwatch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "srenix.labels" . | nindent 4 }}
    srenix.ai/role: aiwatch
spec:
  # Phase 2.F — when ai.replicas > 1, the watcher uses leader-election
  # so exactly one runs tick() at a time. Default 1 (single-replica
  # noop path; byte-identical to pre-2.F deploys).
  replicas: {{ .Values.ai.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "srenix.selectorLabels" . | nindent 6 }}
      srenix.ai/role: aiwatch
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "srenix.selectorLabels" . | nindent 8 }}
        srenix.ai/role: aiwatch
    spec:
      # Reuses the chart's read-only reader SA — the AI companion only
      # reads the cluster and proposes; it never mutates (every tier is
      # recommendation-only behind human approval).
      serviceAccountName: {{ include "srenix.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: aiwatch
          image: {{ include "srenix.aiImage" . }}
          imagePullPolicy: {{ (.Values.ai.image).pullPolicy | default "Always" }}
          args:
            {{- include "srenix.aiArgs" . | nindent 12 }}
          {{- if (.Values.ai.metrics).addr }}
          ports:
            - name: metrics
              containerPort: {{ (.Values.ai.metrics).port | default 9090 }}
              protocol: TCP
          {{- end }}
          env:
            - name: MY_POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            {{- include "srenix.aiEnv" . | nindent 12 }}
            {{- include "srenix.protectedNamespacesEnv" . | nindent 12 }}
            {{- if (.Values.approval).enabled }}
            # t1+ click-to-fix URL signing — same Ed25519 key the
            # approval-server validates with.
            - name: SRENIX_SIGNING_KEY_PATH
              value: /etc/srenix/keys/signing.key
            {{- end }}
          {{- if or (.Values.approval).enabled (.Values.ai.digestPinAttestation).secretName }}
          volumeMounts:
            {{- if (.Values.approval).enabled }}
            - name: signing-key
              mountPath: /etc/srenix/keys
              readOnly: true
            {{- end }}
            {{- if (.Values.ai.digestPinAttestation).secretName }}
            - name: attestation-key
              mountPath: /etc/srenix/attestation
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml (.Values.ai.resources | default .Values.resources) | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- if or (.Values.approval).enabled (.Values.ai.digestPinAttestation).secretName }}
      volumes:
        {{- if (.Values.approval).enabled }}
        - name: signing-key
          secret:
            secretName: {{ .Values.approval.signingKey.secretName | default "srenix-approval-signing-key" }}
            items:
              - key: signing.key
                path: signing.key
                mode: 0400
            optional: false
        {{- end }}
        {{- if (.Values.ai.digestPinAttestation).secretName }}
        - name: attestation-key
          secret:
            secretName: {{ .Values.ai.digestPinAttestation.secretName }}
            items:
              - key: {{ .Values.ai.digestPinAttestation.secretKey | default "attestation.key" }}
                path: {{ .Values.ai.digestPinAttestation.secretKey | default "attestation.key" }}
                mode: 0400
            optional: false
        {{- end }}
      {{- end }}
{{- end }}
