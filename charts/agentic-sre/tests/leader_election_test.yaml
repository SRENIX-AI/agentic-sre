suite: leader election (Sprint 4.3)
templates:
  - templates/role-leader-election.yaml
  - templates/watcher-deployment.yaml
tests:
  - it: lease Role is created when leader election is enabled
    template: templates/role-leader-election.yaml
    set:
      watcher.enabled: true
      watcher.leaderElection.enabled: true
    documentSelector:
      path: kind
      value: Role
    asserts:
      - equal:
          path: rules[0].apiGroups[0]
          value: coordination.k8s.io
      - equal:
          path: rules[0].resources[0]
          value: leases
      - equal:
          path: rules[0].resourceNames[0]
          value: srenix-watcher

  - it: lease Role omitted when leader election is disabled
    template: templates/role-leader-election.yaml
    set:
      watcher.enabled: true
      watcher.leaderElection.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: watcher pod gets downward-API env for leader identity
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_POD_NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_POD_NAME
            valueFrom:
              fieldRef:
                fieldPath: metadata.name

  - it: SRENIX_LEADER_ELECTION=off is set when election disabled
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      watcher.leaderElection.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_LEADER_ELECTION
            value: "off"

  - it: SRENIX_LEADER_ELECTION env is absent when election enabled
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      watcher.leaderElection.enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_LEADER_ELECTION
            value: "off"
