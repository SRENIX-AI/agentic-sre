suite: per-cloud-probe toggles (O6)
templates:
  - templates/watcher-deployment.yaml
tests:
  - it: no SRENIX_CLOUD_PROBE_* env when all cloud probes default-on
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_AWS_RDS
            value: "off"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_GCP_SUBNETS
            value: "off"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_AZURE_KEYVAULTS
            value: "off"

  - it: SRENIX_CLOUD_PROBE_AWS_RDS=off when cloud.aws.probes.rds=false
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      cloud.aws.probes.rds: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_AWS_RDS
            value: "off"
      # Sibling isolation — only the flipped key renders.
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_AWS_EBS
            value: "off"

  - it: SRENIX_CLOUD_PROBE_AWS_EKS=off when cloud.aws.probes.eks=false
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      cloud.aws.probes.eks: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_AWS_EKS
            value: "off"

  - it: SRENIX_CLOUD_PROBE_GCP_SUBNETS=off when cloud.gcp.probes.subnets=false
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      cloud.gcp.probes.subnets: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_GCP_SUBNETS
            value: "off"

  - it: SRENIX_CLOUD_PROBE_GCP_GKE=off when cloud.gcp.probes.gke=false
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      cloud.gcp.probes.gke: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_GCP_GKE
            value: "off"

  - it: SRENIX_CLOUD_PROBE_AZURE_APPGW=off when cloud.azure.probes.appgw=false
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      cloud.azure.probes.appgw: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_AZURE_APPGW
            value: "off"

  - it: no SRENIX_CLOUD_PROBE_GCP_SUBNETS_SMALL_PREFIX env at the default threshold (0 = binary default /26)
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_GCP_SUBNETS_SMALL_PREFIX
            value: "0"
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_GCP_SUBNETS_SMALL_PREFIX
            value: ""

  - it: SRENIX_CLOUD_PROBE_GCP_SUBNETS_SMALL_PREFIX renders from cloud.gcp.subnetsSmallPrefixThreshold
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      cloud.gcp.subnetsSmallPrefixThreshold: 28
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_GCP_SUBNETS_SMALL_PREFIX
            value: "28"
      # The tuning knob must not disturb the sibling opt-out toggles.
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_GCP_SUBNETS
            value: "off"

  - it: toggles render even while cloud.enabled=false (honored the moment the provider switches on)
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      cloud.enabled: false
      cloud.azure.probes.storage: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_CLOUD_PROBE_AZURE_STORAGE
            value: "off"
