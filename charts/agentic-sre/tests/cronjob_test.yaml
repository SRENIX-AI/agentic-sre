suite: CronJob Sprint 1.6 hardening
templates:
  - templates/cronjob-diagnose.yaml
  - templates/cronjob-remediate.yaml
tests:
  - it: diagnose job declares backoffLimit and activeDeadlineSeconds
    template: templates/cronjob-diagnose.yaml
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 1
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 300

  - it: diagnose backoffLimit is configurable
    template: templates/cronjob-diagnose.yaml
    set:
      diagnose.backoffLimit: 3
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 3

  - it: diagnose activeDeadlineSeconds is configurable
    template: templates/cronjob-diagnose.yaml
    set:
      diagnose.activeDeadlineSeconds: 600
    asserts:
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 600

  - it: remediate job declares the same defaults
    template: templates/cronjob-remediate.yaml
    set:
      remediation.enabled: true
    asserts:
      - equal:
          path: spec.jobTemplate.spec.backoffLimit
          value: 1
      - equal:
          path: spec.jobTemplate.spec.activeDeadlineSeconds
          value: 300

  - it: concurrencyPolicy is Forbid (no overlapping runs)
    template: templates/cronjob-diagnose.yaml
    asserts:
      - equal:
          path: spec.concurrencyPolicy
          value: Forbid

  - it: pod runs with restricted security context
    template: templates/cronjob-diagnose.yaml
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].securityContext.allowPrivilegeEscalation
          value: false
