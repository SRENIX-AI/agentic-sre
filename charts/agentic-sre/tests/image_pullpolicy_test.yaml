suite: srenix.pullPolicy helper (Sprint P3)
templates:
  - templates/cronjob-diagnose.yaml
  - templates/watcher-deployment.yaml
tests:
  - it: pinned semver tag uses IfNotPresent
    template: templates/cronjob-diagnose.yaml
    set:
      image.tag: v1.6.0
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].imagePullPolicy
          value: IfNotPresent

  - it: latest tag forces Always
    template: templates/cronjob-diagnose.yaml
    set:
      image.tag: latest
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: -latest suffix forces Always
    template: templates/cronjob-diagnose.yaml
    set:
      image.tag: dev-latest
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: explicit override wins
    template: templates/cronjob-diagnose.yaml
    set:
      image.tag: v1.6.0
      image.pullPolicy: Always
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: watcher applies the same helper
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      image.tag: latest
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
