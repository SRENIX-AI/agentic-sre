suite: AI-companion (Srenix Enterprise) deployment wiring (v1.8.4)
templates:
  - templates/aiwatch-deployment.yaml
  - templates/watcher-deployment.yaml
tests:
  - it: no aiwatch Deployment when ai.enabled is false (OSS default)
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: OSS watcher is NEVER given --ai-* args (stays the OSS binary)
    template: templates/watcher-deployment.yaml
    set:
      watcher.enabled: true
      ai.enabled: true
      ai.tier: t3
      ai.endpoint: "https://mcp.baisoln.com/gpu-ai/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--ai-tier=t3"

  - it: aiwatch Deployment runs srenix-enterprise watch with the full t3 flag surface
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.tier: t3
      ai.endpoint: "https://mcp.baisoln.com/gpu-ai/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
      ai.interval: "120s"
      ai.apiKey.header: "X-API-Key"
      ai.apiKey.secretName: "srenix-ai-llm-key"
      ai.auditLog: "-"
      ai.llmFixerMatcher: true
      ai.t3.vaultAllowedPrefixes:
        - "secret/data/srenix-recovery/"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].args[0]
          value: watch
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--ai-tier=t3"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--ai-endpoint=https://mcp.baisoln.com/gpu-ai/v1"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--ai-model=qwen3.6-35b-a3b-fp8"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--interval=120s"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--ai-api-key-header=X-API-Key"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--ai-llm-fixer-matcher"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--ai-audit-log=-"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--t3-vault-allowed-prefix=secret/data/srenix-recovery/"

  - it: aiwatch uses the srenix-enterprise image with the v-prefixed tag
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.endpoint: "https://mcp.baisoln.com/gpu-ai/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
    asserts:
      # Match the v-prefix pattern rather than a hardcoded tag so the test
      # survives appVersion bumps (the default tag is v<AppVersion>). The
      # optional `-prerelease` suffix supports the pre-launch 0.x-alpha.N
      # versioning (e.g. v0.1.0-alpha.1).
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: ^docker4zerocool/srenix-enterprise:v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$

  - it: AI_API_KEY env is sourced from the secret (never inlined)
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.endpoint: "https://mcp.baisoln.com/gpu-ai/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
      ai.apiKey.secretName: "srenix-ai-llm-key"
      ai.apiKey.secretKey: "apikey"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AI_API_KEY
            valueFrom:
              secretKeyRef:
                name: srenix-ai-llm-key
                key: apikey

  - it: signing key is mounted only when approval.enabled
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.tier: t3
      ai.endpoint: "https://mcp.baisoln.com/gpu-ai/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
      approval.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SRENIX_SIGNING_KEY_PATH
            value: /etc/srenix/keys/signing.key

  - it: RAG memory args render only when ai.memory.enabled
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.tier: t1
      ai.endpoint: "https://mcp.baisoln.com/gpu-ai/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
      ai.memory.enabled: true
      ai.memory.embeddings.model: "qwen3-embedding-0.6b"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--memory-store-url=http://RELEASE-NAME-agentic-sre-rag.NAMESPACE.svc:6333"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--memory-embeddings-model=qwen3-embedding-0.6b"
      - contains:
          path: spec.template.spec.containers[0].args
          content: "--memory-topk=5"

  - it: no RAG memory args when ai.memory disabled (default)
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.tier: t1
      ai.endpoint: "https://mcp.baisoln.com/gpu-ai/v1"
      ai.model: "qwen3.6-35b-a3b-fp8"
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].args
          content: "--memory-store-url=http://RELEASE-NAME-agentic-sre-rag.NAMESPACE.svc:6333"

  - it: ai.enabled with no endpoint fails the render
    template: templates/aiwatch-deployment.yaml
    set:
      ai.enabled: true
      ai.tier: t3
      ai.model: "qwen3.6-35b-a3b-fp8"
    asserts:
      - failedTemplate:
          errorMessage: "ai.endpoint is required when ai.enabled=true"
