# GoReleaser config — produces signed binaries + multi-arch container images
# on every git tag matching v*.*.*. See https://goreleaser.com/.
version: 2

project_name: agentic-sre

before:
  hooks:
    - go mod tidy

builds:
  - id: srenix
    main: ./cmd/srenix
    binary: srenix
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .ShortCommit }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: srenix
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - SECURITY.md

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

# Software Bill of Materials (CycloneDX JSON), one per release artifact.
# Generated by syft (installed in the release workflow via anchore/sbom-action).
# Fulfils the website's "SBOM (paid)" claim — every published binary archive
# ships an accompanying CycloneDX SBOM attached to the GitHub Release.
# See docs/RELEASE_VERIFICATION.md for how to download + inspect them.
sboms:
  - id: archive
    artifacts: archive
    documents:
      - "{{ .ArtifactName }}.cyclonedx.json"
    cmd: syft
    args:
      - "$artifact"
      - "--output"
      - "cyclonedx-json=$document"

# Keyless (Sigstore/Fulcio/Rekor) signing of the checksums file. The signed
# checksums transitively cover every binary archive + SBOM listed in it.
# Keyless = no private key to manage or leak: the workflow's OIDC token
# (permissions.id-token: write) is exchanged for a short-lived Fulcio cert,
# and the signature + cert are bundled into a .sigstore.json attached to the
# Release. cosign is installed in CI via sigstore/cosign-installer.
# NOTE: this path ONLY executes in CI under a real OIDC token; `--snapshot`
# builds skip it (no OIDC), which is why the release workflow runs it and
# local snapshot runs use --skip=sign.
signs:
  - id: checksum-keyless
    cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Container images: multi-arch, published to Docker Hub (canonical) and
# GHCR (mirror). The Helm chart's default image.repository is
# docker4zerocool/agentic-sre; operators who prefer GHCR
# can flip the repository value. The chart's default image.tag matches
# Chart.appVersion, so a release with tag v1.6.0 produces both
# docker4zerocool/agentic-sre:1.6.0 and
# ghcr.io/srenix-ai/agentic-sre:1.6.0.
dockers:
  - id: amd64
    image_templates:
      - "docker4zerocool/agentic-sre:{{ .Version }}-amd64"
      - "docker4zerocool/agentic-sre:latest-amd64"
      - "ghcr.io/srenix-ai/agentic-sre:{{ .Version }}-amd64"
      - "ghcr.io/srenix-ai/agentic-sre:latest-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.source=https://github.com/srenix-ai/agentic-sre"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Self-healing operations layer for Kubernetes"
      - "--label=org.opencontainers.image.url=https://github.com/srenix-ai/agentic-sre"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .ShortCommit }}"
      - "--build-arg=TARGETOS=linux"
      - "--build-arg=TARGETARCH=amd64"
    extra_files:
      - cmd
      - internal
      - pkg
      - catalog
      - api
      - go.mod
      - go.sum
    goarch: amd64

  - id: arm64
    image_templates:
      - "docker4zerocool/agentic-sre:{{ .Version }}-arm64"
      - "docker4zerocool/agentic-sre:latest-arm64"
      - "ghcr.io/srenix-ai/agentic-sre:{{ .Version }}-arm64"
      - "ghcr.io/srenix-ai/agentic-sre:latest-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.source=https://github.com/srenix-ai/agentic-sre"
      - "--label=org.opencontainers.image.title={{ .ProjectName }}"
      - "--label=org.opencontainers.image.description=Self-healing operations layer for Kubernetes"
      - "--label=org.opencontainers.image.url=https://github.com/srenix-ai/agentic-sre"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"
      - "--label=org.opencontainers.image.licenses=Apache-2.0"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .ShortCommit }}"
      - "--build-arg=TARGETOS=linux"
      - "--build-arg=TARGETARCH=arm64"
    extra_files:
      - cmd
      - internal
      - pkg
      - catalog
      - api
      - go.mod
      - go.sum
    goarch: arm64

# Multi-arch manifest: combines the two arch-specific images under a
# single tag (and `latest`), so users pull `:v0.1.0` and Docker picks
# the right arch for their platform automatically.
docker_manifests:
  # Canonical: Docker Hub
  - name_template: "docker4zerocool/agentic-sre:{{ .Version }}"
    image_templates:
      - "docker4zerocool/agentic-sre:{{ .Version }}-amd64"
      - "docker4zerocool/agentic-sre:{{ .Version }}-arm64"
  - name_template: "docker4zerocool/agentic-sre:latest"
    image_templates:
      - "docker4zerocool/agentic-sre:latest-amd64"
      - "docker4zerocool/agentic-sre:latest-arm64"
  # Mirror: GHCR
  - name_template: "ghcr.io/srenix-ai/agentic-sre:{{ .Version }}"
    image_templates:
      - "ghcr.io/srenix-ai/agentic-sre:{{ .Version }}-amd64"
      - "ghcr.io/srenix-ai/agentic-sre:{{ .Version }}-arm64"
  - name_template: "ghcr.io/srenix-ai/agentic-sre:latest"
    image_templates:
      - "ghcr.io/srenix-ai/agentic-sre:latest-amd64"
      - "ghcr.io/srenix-ai/agentic-sre:latest-arm64"

# Keyless cosign signing of every container image + multi-arch manifest pushed
# above (Docker Hub + GHCR). Fulfils the website's "Cosign-signed container
# images with attestation" claim. `artifacts: all` covers both the per-arch
# images (dockers) and the combined manifests (docker_manifests). Each pushed
# digest is signed and the signature is uploaded to the registry's OCI
# signature tag (sha256-<digest>.sig) AND recorded in the Rekor transparency
# log. Keyless: the CI OIDC token → Fulcio cert; no key material on disk.
# `cosign sign ${artifact}@${digest}` is the canonical image-signing form.
# Verify with `cosign verify` (see docs/RELEASE_VERIFICATION.md). Like signs:
# above, this only runs in CI under OIDC; local snapshot uses --skip=sign.
docker_signs:
  - id: image-keyless
    cmd: cosign
    artifacts: all
    output: true
    args:
      - "sign"
      - "${artifact}@${digest}"
      - "--yes"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"

release:
  github:
    owner: Srenix
    name: agentic-sre
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Version }}"
  header: |
    Agentic SRE **{{ .Version }}** — see the [README](https://github.com/srenix-ai/agentic-sre/blob/main/README.md) for the 30-second demo.

    ## Install
    - Binaries below for darwin-{amd64,arm64}, linux-{amd64,arm64}, and windows-{amd64,arm64}.
    - Container image: `ghcr.io/srenix-ai/agentic-sre:{{ .Version }}` (multi-arch).
    - Helm chart: `charts/agentic-sre/` at this tag.
  footer: |
    ---
    Full changelog: [{{ .PreviousTag }}...{{ .Tag }}](https://github.com/srenix-ai/agentic-sre/compare/{{ .PreviousTag }}...{{ .Tag }})
